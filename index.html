              <div className="absolute top-[245px] left-1/2 -translate-x-1/2 w-32 h-52 pointer-events-none z-10 animate-[walk-bob_4s_infinite_alternate]">
                <img 
                  src={profileGender === 'girl' ? 'girl.png' : 'boy.png'} 
                  className="w-full h-full object-contain"
                  alt="Explorer Avatar"
                />
              </div>

              <div className="flex flex-col gap-2.5 mb-4 z-20 max-w-[240px] w-full mx-auto">
                <button
                  onClick={() => navigateTo('list')}
                  className="w-full py-2.5 bg-gradient-to-b from-[#e7b85e] to-[#ab7418] hover:from-[#f7cb75] hover:to-[#be8420] text-[#2c1a0c] font-black font-layton-myeongjo text-[13px] rounded-xl border-2 border-[#ffe8b5] shadow-[0_4px_10px_rgba(0,0,0,0.6)] hover:scale-[1.02] active:scale-95 transition-all duration-200 text-center"
                >
                  📖 성경 탐험 시작하기
                </button>
 
                <button
                  onClick={() => navigateTo('list')}
                  className="w-full py-2.5 bg-gradient-to-b from-[#5c4a3c] to-[#3a2c20] hover:from-[#6d5747] hover:to-[#453426] text-layton-cream font-bold font-layton-myeongjo text-[12px] rounded-xl border border-layton-gold/40 shadow-[0_4px_8px_rgba(0,0,0,0.5)] hover:scale-[1.02] active:scale-95 transition-all duration-200 flex justify-center items-center gap-2"
                >
                  🗺️ 성경 지도 보기
                </button>
 
                <div className="flex justify-between items-center px-1 mt-1 text-white font-layton-myeongjo drop-shadow-[0_2px_4px_rgba(0,0,0,1)]">
                  <button
                    onClick={() => setIsBgmPlaying(prev => !prev)}
                    className="text-[9px] text-yellow-300 hover:text-yellow-200 font-bold"
                  >
                    {isBgmPlaying ? '🎵 음악 켬' : '🔇 음악 끎'}
                  </button>
                  <span className="text-stone-500 text-[9px]">|</span>
                  <button
                    onClick={handleResetAllProgress}
                    className="text-[9px] text-red-300 hover:text-red-200 font-bold hover:underline"
                  >
                    초기화 🔄
                  </button>
                </div>
              </div>
            </div>
          )}
          
           {/* SCREEN 2: PUZZLE EXPLORE MAP */}
          {screen === 'list' && (
            <PuzzleMap 
              puzzlesList={puzzlesList}
              completedPuzzles={completedPuzzles}
              coins={coins}
              activePuzzleId={activePuzzleId}
              isBgmPlaying={isBgmPlaying}
              onToggleBgm={() => setIsBgmPlaying(prev => !prev)}
              profileGender={profileGender}
              onSelectPuzzle={(puzzleId) => {
                setActivePuzzleId(puzzleId);
                navigateTo('game');
              }}
              onBack={() => navigateTo('menu')}
            />
          )}

          {/* SCREEN 3: ACTIVE PUZZLE SCREEN */}
          {screen === 'game' && (
            <div className="flex-1 flex flex-col fade-in z-10 pt-[6px] px-[6px] pb-[6px]">
              
              {/* Shared Puzzle Header */}
              <div className="relative bg-[#36200c] border-b border-layton-gold py-1.5 px-2 flex justify-between items-center z-10 select-none">
                <button
                  onClick={() => navigateTo('list')}
                  className="text-[9px] text-layton-amber font-layton-myeongjo font-bold hover:text-yellow-400 transition-colors whitespace-nowrap"
                >
                  ◀ 도감목록
                </button>
                <div className="text-center mx-1 flex-1 min-w-0">
                  <h2 className="text-layton-cream font-layton-myeongjo font-bold text-[9px] tracking-tight truncate">
                    {activePuzzleId === 'puzzle-001' ? '1스테이지: 빛과 어둠의 분리' : '오병이어: 나누면 커지는 기적'}
                  </h2>
                </div>
                <div className="flex items-center gap-1.5 flex-none">
                  <button
                    onClick={() => setIsBgmPlaying(prev => !prev)}
                    className="text-[9px] hover:scale-110 active:scale-90 transition-transform"
                    title="배경음악 켜기/끄기"
                  >
                    {isBgmPlaying ? '🎵' : '🔇'}
                  </button>
                  <span className="text-stone-600 text-[8px]">|</span>
                  <div className="flex items-center gap-0.5 text-yellow-400 text-[9px] font-bold">
                    <span>🪙</span>
                    <span>{coins}</span>
                  </div>
                  <span className="text-stone-600 text-[8px]">|</span>
                  <div className="flex items-center gap-0.5">
                    <span className="text-layton-amber text-[9px] font-bold">
                      {activePuzzleId === 'puzzle-001' ? '30' : '40'}
                    </span>
                    <span className="text-layton-gold text-[8px] font-extrabold font-serif italic tracking-wide">P</span>
                  </div>
                </div>
              </div>

              {/* Conditional stage rendering */}
              {activePuzzleId === 'puzzle-001' ? (
                <PuzzleNoah 
                  coins={coins}
                  onSpendCoins={handleSpendCoins}
                  onBack={() => navigateTo('list')} 
                  onSolved={handlePuzzleSolved} 
                />
              ) : (
                <PuzzleFiveLoaves 
                  coins={coins}
                  onSpendCoins={handleSpendCoins}
                  onBack={() => navigateTo('list')} 
                  onSolved={handlePuzzleSolved} 
                />
              )}
            </div>
          )}

          {/* SHARED THEOLOGICAL SUCCESS MODAL OVERLAY */}
          {isSolved && (
            <div className="absolute inset-0 bg-[#0e0a06]/90 z-50 flex flex-col justify-between p-4 overflow-y-auto parchment-scroll">
              
              {/* SOLVED BANNER */}
              {solvedAnimation && (
                <div className="flex-none text-center my-4 solved-banner">
                  <div className="inline-block relative">
                    <div className="bg-red-700 text-[#fff5db] border-4 border-layton-gold font-extrabold text-lg px-8 py-2.5 rounded-full shadow-2xl uppercase tracking-widest relative z-10 font-layton-myeongjo animate-[bounce_1s_infinite_alternate]">
                      🎉 수수께끼 해결!
                    </div>
                    <div className="absolute -inset-0.5 bg-black rounded-full blur-sm opacity-50"></div>
                  </div>
                </div>
              )}

              {/* CARD MESSAGE OVERLAY */}
              <div className="flex-1 bg-layton-parchment border-4 border-layton-amber rounded-2xl p-4 shadow-2xl flex flex-col justify-between my-2 overflow-y-auto parchment-scroll">
                <div>
                  {solvedPuzzleId === 'puzzle-001' ? (
                    // Separation of Light and Darkness reflection
                    <div>
                      <div className="text-center border-b border-layton-brown/30 pb-2 mb-3 font-layton-myeongjo">
                        <span className="text-[10px] text-layton-lightbrown font-bold tracking-wider uppercase">Theological Puzzle Reflection</span>
                        <h4 className="font-layton-myeongjo font-black text-sm text-layton-brown mt-0.5">창조의 은혜 : 가짜를 끄고 참된 빛을 봄</h4>
                      </div>
                      
                      <div className="w-full flex justify-center py-2 mb-2 bg-[#120f18] border border-layton-brown/10 rounded-lg">
                        <svg width="90" height="60" viewBox="0 0 120 90" xmlns="http://www.w3.org/2000/svg">
                          <rect width="120" height="90" fill="#0c0a0f" rx="8" />
                          <circle cx="20" cy="20" r="1.5" fill="#ffd700" opacity="0.6"/>
                          <circle cx="100" cy="30" r="1" fill="#fff" opacity="0.8"/>
                          <circle cx="85" cy="70" r="1.5" fill="#fff" opacity="0.5"/>
                          <circle cx="35" cy="65" r="1" fill="#ffd700" opacity="0.7"/>
                          
                          <circle cx="60" cy="45" r="30" fill="url(#sunGlow)" opacity="0.15"/>
                          <circle cx="60" cy="45" r="15" fill="url(#sunGlow)" opacity="0.4"/>
                          
                          <circle cx="60" cy="45" r="8" fill="#ffffff" />
                          <circle cx="60" cy="45" r="8" fill="#ffd700" opacity="0.5" />
                          
                          <line x1="60" y1="28" x2="60" y2="20" stroke="#ffd700" strokeWidth="1.5" strokeLinecap="round" />
                          <line x1="60" y1="62" x2="60" y2="70" stroke="#ffd700" strokeWidth="1.5" strokeLinecap="round" />
                          <line x1="43" y1="45" x2="35" y2="45" stroke="#ffd700" strokeWidth="1.5" strokeLinecap="round" />
                          <line x1="77" y1="45" x2="85" y2="45" stroke="#ffd700" strokeWidth="1.5" strokeLinecap="round" />
                          <line x1="48" y1="33" x2="42" y2="27" stroke="#ffd700" strokeWidth="1.2" strokeLinecap="round" />
                          <line x1="72" y1="57" x2="78" y2="63" stroke="#ffd700" strokeWidth="1.2" strokeLinecap="round" />
                          <line x1="72" y1="33" x2="78" y2="27" stroke="#ffd700" strokeWidth="1.2" strokeLinecap="round" />
                          <line x1="48" y1="57" x2="42" y2="63" stroke="#ffd700" strokeWidth="1.2" strokeLinecap="round" />

                          <defs>
                            <radialGradient id="sunGlow" cx="50%" cy="50%" r="50%">
                              <stop offset="0%" stopColor="#ffffff"/>
                              <stop offset="50%" stopColor="#ffd700"/>
                              <stop offset="100%" stopColor="#0c0a0f" stopOpacity="0"/>
                            </radialGradient>
                          </defs>
                        </svg>
                      </div>

                      <p className="font-layton-myeongjo text-[11px] leading-relaxed text-layton-dark font-medium text-justify break-keep mb-3">
                        우리는 이 세상의 수많은 반짝임들(🧸 장난감, 💵 재물, 📱 스마트폰 등)을 가치 있는 '빛'으로 착각하고 쫓아갑니다. 그러나 이들은 참된 생명을 주지 못하는 '가짜 유혹의 빛'일 뿐입니다.
                      </p>

                      <blockquote className="border-l-2 border-red-700 pl-2 py-0.5 bg-red-50/50 mb-3">
                        <p className="font-layton-myeongjo text-[11px] font-bold text-red-800 italic leading-relaxed break-keep">
                          "참된 은혜는 세상의 화려한 소음과 가짜 빛들을 꺼버리고 온전히 비워진 내 마음에 하나님의 진정한 창조의 빛이 찾아올 때 시작됩니다."
                        </p>
                      </blockquote>

                      <p className="font-layton-myeongjo text-[11px] leading-relaxed text-layton-dark font-medium text-justify break-keep">
                        가짜 빛들을 모두 터치하여 끈 뒤 비로소 만나게 된 참된 흑암 상태에서, 하나님께서는 비로소 진짜 생명의 빛을 선포하십니다. "빛이 있으라 하매 빛이 있었고..." 이 분리함을 통해 우리는 영적인 참 빛의 소중함을 깨닫습니다.
                      </p>
                    </div>
                  ) : (
                    // Five Loaves and Two Fish reflection
                    <div>
                      <div className="text-center border-b border-layton-brown/30 pb-2 mb-3 font-layton-myeongjo">
                        <span className="text-[10px] text-layton-lightbrown font-bold tracking-wider uppercase">Theological Puzzle Reflection</span>
                        <h4 className="font-layton-myeongjo font-black text-sm text-layton-brown mt-0.5">나눔의 비결 : 쪼개어지는 축복</h4>
                      </div>
                      
                      <div className="w-full flex justify-center py-2 mb-2 bg-[#f0ebd7] border border-layton-brown/10 rounded-lg">
                        <svg width="90" height="60" viewBox="0 0 120 90" xmlns="http://www.w3.org/2000/svg">
                          <ellipse cx="60" cy="55" rx="35" ry="18" fill="#d4a373" stroke="#8b5a2b" strokeWidth="2.5"/>
                          <circle cx="50" cy="46" r="8" fill="#ffd700" opacity="0.9"/>
                          <circle cx="70" cy="48" r="7" fill="#ffd700" opacity="0.9"/>
                          <circle cx="60" cy="43" r="9" fill="#f5ead6" stroke="#814109" strokeWidth="1.5"/>
                          <path d="M 60,20 L 60,50 M 50,30 L 70,30" stroke="#e6a817" strokeWidth="3" strokeLinecap="round" opacity="0.85"/>
                          <ellipse cx="60" cy="55" rx="35" ry="8" fill="#e5ba90" stroke="#8b5a2b" strokeWidth="1" opacity="0.3"/>
                        </svg>
                      </div>

                      <p className="font-layton-myeongjo text-[11px] leading-relaxed text-layton-dark font-medium text-justify break-keep mb-3">
                        세상의 지혜는 움켜쥐고(더하기) 곱해서 자산을 불릴 때 부요함이 찾아온다고 말합니다. 
                        하지만 하늘나라의 기적은 오직 우리가 가진 가장 크고 소중한 것(Lv5)을 주님의 손에 올리고, 기꺼이 쪼개고 나눌 때 일어납니다.
                      </p>

                      <blockquote className="border-l-2 border-red-700 pl-2 py-0.5 bg-red-50/50 mb-3">
                        <p className="font-layton-myeongjo text-[11px] font-bold text-red-800 italic leading-relaxed break-keep font-layton-myeongjo">
                          "보리떡과 물고기가 더 작게 나누어지고 쪼개어질 때, 오히려 5천 명을 먹이고도 12바구니가 가득 차 흐릅니다."
                        </p>
                      </blockquote>

                      <p className="font-layton-myeongjo text-[11px] leading-relaxed text-layton-dark font-medium text-justify break-keep">
                        나를 쪼개어 타인을 채우는 '나눔의 신비'. 내가 작아지고 소외될 때 주님의 손을 통해 
                        오히려 만물이 풍성해지는 오병이어의 반전 법칙이야말로 하나님께서 세상을 돌보시는 사랑의 원리입니다.
                      </p>
                    </div>
                  )}
                </div>

                <div className="mt-4 flex flex-col gap-2">
                  <div className="bg-yellow-100 border border-yellow-300 text-yellow-800 text-[10px] text-center font-bold font-sans py-1 rounded font-layton-myeongjo">
                    ★ PICARATS +{solvedPuzzleId === 'puzzle-001' ? '30' : '40'} ACQUIRED ★
                  </div>

                  <button
                    onClick={() => {
                      setIsSolved(false);
                      setSolvedPuzzleId(null);
                      setSolvedAnimation(false);
                      navigateTo('list');
                    }}
                    className="w-full py-2 bg-gradient-to-b from-layton-amber to-amber-600 hover:from-yellow-400 hover:to-amber-500 text-layton-dark font-bold font-layton-myeongjo text-xs rounded-xl border border-layton-gold shadow-md active:scale-95 transition-all text-center font-layton-myeongjo"
                  >
                    도감 목록으로 돌아가기 🗂️
                  </button>
                </div>
              </div>

            </div>
          )}

        </div>
      );
    }

    const container = document.getElementById('root');
    const root = ReactDOM.createRoot(container);
    root.render(<App />);
  </script>
</body>
</html>
