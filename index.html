    function PuzzleMap({ puzzlesList, completedPuzzles, coins, activePuzzleId, isBgmPlaying, onToggleBgm, profileGender, onSelectPuzzle, onBack, onActivateAdmin }) {
      const nodes = [
        { id: 'puzzle-001', x: 20, y: 18, emoji: '💡', name: '스테이지 1: 빛과 어둠의 분리', picarats: 30 },
        { id: 'puzzle-002', x: 70, y: 32, emoji: '🦁', name: '스테이지 2: 에덴동산의 동물들', picarats: 35 },
        { id: 'puzzle-003', x: 20, y: 46, emoji: '🍎', name: '스테이지 3: 선악과와 인간의 타락', picarats: 40 },
        { id: 'puzzle-004', x: 82, y: 48, emoji: '🚢', name: '스테이지 4: 방주의 잃어버린 짝', picarats: 45 },
        { id: 'puzzle-005', x: 43, y: 62, emoji: '🧱', name: '스테이지 5: 바벨탑과 흩어진 인류', picarats: 50 },
        { id: 'puzzle-006', x: 21, y: 74, emoji: '⛺', name: '스테이지 6: 아브라함과 믿음의 제단', picarats: 55 },
        { id: 'puzzle-007', x: 79, y: 82, emoji: '🐏', name: '스테이지 7: 이삭과 야곱', picarats: 60 },
      ];

      // Find initial character position based on activePuzzleId or completed progress
      const getInitialNode = () => {
        if (activePuzzleId) {
          const match = nodes.find(n => n.id === activePuzzleId);
          if (match) return match;
        }
        // Fallback to last unsolved, or start
        const unsolved = puzzlesList.find(p => !completedPuzzles.includes(p.id));
        if (unsolved) {
          const match = nodes.find(n => n.id === unsolved.id);
          if (match) return match;
        }
        return nodes[0];
      };
      const initialNode = getInitialNode();
      const [charPos, setCharPos] = useState({ x: initialNode.x, y: initialNode.y });
      const [isWalking, setIsWalking] = useState(false);
      const [activeBubble, setActiveBubble] = useState(null);

      // Play footstep click interval during walking state
      useEffect(() => {
        if (!isWalking) return;
        
        synth.playStep();
        const intervalId = setInterval(() => {
          synth.playStep();
        }, 220);

        return () => clearInterval(intervalId);
      }, [isWalking]);

      const handleNodeClick = (node) => {
        if (isWalking) return;
        setActiveBubble(null);

        if (charPos.x === node.x && charPos.y === node.y) {
          // Already there, open bubble directly
          if (node.id !== 'start') {
            setActiveBubble(node);
          }
          return;
        }

        // Trigger smooth walk
        setIsWalking(true);
        setCharPos({ x: node.x, y: node.y });

        // Wait for walking transition (1.4s) to complete
        setTimeout(() => {
          setIsWalking(false);
          if (node.id !== 'start') {
            setActiveBubble(node);
          }
        }, 1400);
      };

      return (
        <div className="flex-1 flex flex-col bg-layton-parchment z-10 fade-in select-none relative overflow-hidden">
          
          {/* Header */}
          <div className="bg-[#36200c] border-b-2 border-layton-gold p-3 flex justify-between items-center text-center z-10">
            <button 
              onClick={onBack}
              className="text-xs text-layton-amber font-layton-myeongjo font-bold hover:text-yellow-400 transition-colors"
            >
              ◀ 메인메뉴
            </button>
            <h2 className="text-layton-cream font-layton-myeongjo font-bold text-sm">성경 탐험 지도</h2>
            <div className="flex items-center gap-2 text-[9px] text-layton-amber font-sans">
              <button
                onClick={onToggleBgm}
                className="text-xs hover:scale-110 active:scale-90 transition-transform mr-1"
                title="배경음악 켜기/끄기"
              >
                {isBgmPlaying ? '🎵' : '🔇'}
              </button>
              <span className="text-stone-500">|</span>
              <span className="text-yellow-400 font-bold text-[10px]">🪙 {coins}</span>
              <span>|</span>
              <span>총 <span className="font-bold text-[11px] text-layton-gold">{completedPuzzles.length * 30}</span> P</span>
            </div>
          </div>

          {/* Subheader hint */}
          <div className="bg-[#fdf8eb] border-b border-layton-brown/15 py-1 px-3 text-center text-[10px] text-layton-brown font-layton-myeongjo font-bold z-10 shadow-sm leading-tight break-keep">
            📍 지도의 아이콘을 터치하여 꼬마 탐정을 이동시키고 수수께끼를 해결하세요!
          </div>

          {/* Map Content Canvas Area */}
          <div className="flex-1 relative bg-stone-900 overflow-hidden shadow-inner">
            
            {/* Map Background Illustration */}
            <div 
              className="absolute inset-0 bg-cover bg-center bg-no-repeat z-0" 
              style={{ backgroundImage: "url('map_bg.jpg')", backgroundSize: '100% 100%' }}
            />

            {/* Puzzle Landmarks Nodes */}
            {nodes.map((node, index) => {
              const isCompleted = completedPuzzles.includes(node.id);
              // Progressive unlocking system: first stage is unlocked, or unlocked if previous stage is completed
              const isLocked = index > 0 && !completedPuzzles.includes(nodes[index - 1].id);

              return (
                <div
                  key={node.id}
                  onClick={() => handleNodeClick(node)}
                  className="absolute text-center flex flex-col items-center pointer-events-auto cursor-pointer group z-10"
                  style={{ left: `${node.x}%`, top: `${node.y}%`, transform: 'translate(-50%, -50%)' }}
                >
                  {/* Bobbing effect for active landmarks */}
                  {/* Bobbing effect for active landmarks */}
                  <div 
                    className="w-20 h-20 rounded-full relative transition-all duration-200 hover:scale-110 active:scale-95 mini-float"
                    style={{
                      filter: isLocked 
                        ? 'grayscale(1) opacity(0.45) brightness(0.6)' 
                        : isCompleted
                          ? 'drop-shadow(0 0 10px rgba(250, 204, 21, 0.75)) drop-shadow(0 4px 6px rgba(0,0,0,0.3))'
                          : 'drop-shadow(0 4px 8px rgba(0,0,0,0.35))'
                    }}
                  >
                    {/* Landmark Icon Image */}
                    <img 
                      src={`${node.id.replace('puzzle-00', 'stage')}_icon.png?v=7`} 
                      className="w-full h-full object-contain rounded-full"
                      alt={node.name}
                    />

                    {/* Locked overlay lock icon */}
                    {isLocked && (
                      <div className="absolute inset-0 flex items-center justify-center">
                        <span className="text-3xl drop-shadow-[0_2px_4px_rgba(0,0,0,0.8)]">🔒</span>
                      </div>
                    )}

                    {/* Solved Stamp Badge */}
                    {isCompleted && (
                      <span className="absolute -top-1 -right-1 bg-red-600 text-[#ffeedd] text-[8px] font-black px-1.5 py-0.5 rounded border border-red-500 shadow-md uppercase scale-110 rotate-[8deg] select-none tracking-wider animate-pulse z-10">
                        ✓
                      </span>
                    )}
                  </div>
                  
                  {/* Mini title tag under node */}
                  <span className="bg-[#4a2e13]/85 text-[#fdf8eb] text-[8px] font-black px-1.5 py-0.5 rounded-full border border-layton-gold/30 mt-1 pointer-events-none font-layton-myeongjo shadow">
                    {`스테이지 ${index + 1}`}
                  </span>
                </div>
              );
            })}

            {/* Walking Detective Character Avatar */}
            <div 
              className={`absolute pointer-events-none z-20 ${isWalking ? 'walk-bob' : ''}`}
              style={{
                left: `${charPos.x}%`,
                top: `${charPos.y}%`,
                transform: 'translate(-50%, -90%)',
                transition: 'left 1.4s ease-in-out, top 1.4s ease-in-out'
              }}
            >
              <div className="relative flex flex-col items-center">
                {/* Cute Explorer standing image avatar */}
                <div className="w-10 h-16 overflow-hidden flex items-center justify-center">
                  <img 
                    src={profileGender === 'girl' ? 'girl.png' : 'boy.png'} 
                    className="h-full object-contain" 
                    alt="Explorer Token"
                  />
                </div>
                {/* Foot shadow under explorer */}
                <div className="w-6 h-1.5 bg-black/20 rounded-full blur-[1px] mt-0.5"></div>
              </div>
            </div>

            {/* Dialog Level Bubble Card Modal */}
            {activeBubble && (
              <div className="absolute bottom-4 left-4 right-4 bg-layton-parchment rounded-2xl border-4 border-layton-brown p-3.5 shadow-2xl flex flex-col items-center text-center solved-banner z-30">
                <div className="w-12 h-12 rounded-full border border-layton-brown/30 overflow-hidden mb-1.5 shadow-sm">
                  <img 
                    src={`${activeBubble.id.replace('puzzle-00', 'stage')}_icon.png?v=7`} 
                    className="w-full h-full object-cover" 
                    alt={activeBubble.name}
                  />
                </div>
                <span className="text-[8px] bg-amber-500 text-[#2c1a0c] font-black px-2 py-0.2 rounded-full font-sans uppercase">
                  PUZZLE {activeBubble.id.replace('puzzle-', '')}
                </span>
                
                <h3 className="font-layton-myeongjo font-black text-xs text-layton-dark mt-1.5 mb-1 break-keep">
                  {activeBubble.name}
                </h3>
                <p className="text-[10px] text-layton-lightbrown font-sans font-medium mb-3">
                  배점: <span className="font-bold text-layton-brown">{activeBubble.picarats} Picarats</span>
                  {completedPuzzles.includes(activeBubble.id) && <span className="text-red-700 font-extrabold ml-2 font-serif">★ SOLVED ★</span>}
                </p>

                {(() => {
                  const bubbleIndex = nodes.findIndex(n => n.id === activeBubble.id);
                  const isDynamicallyLocked = bubbleIndex > 0 && !completedPuzzles.includes(nodes[bubbleIndex - 1].id);
                  return isDynamicallyLocked ? (
                    <div className="w-full text-center py-2 bg-stone-200 border border-stone-300 text-stone-500 font-black text-xs rounded-xl font-layton-myeongjo">
                      🔒 이전 스테이지를 먼저 클리어하세요!
                    </div>
                ) : (
                  <div className="flex gap-2 w-full">
                    <button
                      onClick={() => setActiveBubble(null)}
                      className="flex-1 py-2 bg-stone-300 hover:bg-stone-400 text-stone-800 text-xs font-bold rounded-xl border border-stone-400 transition-colors font-layton-myeongjo active:scale-95"
                    >
                      지도 닫기
                    </button>
                    <button
                      onClick={() => onSelectPuzzle(activeBubble.id)}
                      className="flex-1 py-2 bg-gradient-to-b from-[#ebdcb9] to-[#c2af84] hover:from-[#fcf4dc] hover:to-[#dcd0ac] text-layton-dark text-xs font-black rounded-xl border-2 border-[#f2e7cb] shadow active:scale-95 transition-all font-layton-myeongjo"
                    >
                      도전하기! 🎯
                    </button>
                  </div>
                 );
                })()}
              </div>
            )}

          </div>

        </div>
      );
    }

    // MAIN CONTROLLER APP COMPONENT



function App() {
      const [profileName, setProfileName] = useState(() => {
        return localStorage.getItem('bible_quiz_profile_name') || '';
      });
      const [profileGender, setProfileGender] = useState(() => {
        return localStorage.getItem('bible_quiz_profile_gender') || '';
      });

      const [screen, setScreen] = useState('opening');
      const [isVideoMuted, setIsVideoMuted] = useState(true);
      const videoRef = useRef(null);
      const [activePuzzleId, setActivePuzzleId] = useState(null);

      const getNextScreenAfterOpening = () => {
        const hasName = localStorage.getItem('bible_quiz_profile_name');
        const hasGender = localStorage.getItem('bible_quiz_profile_gender');
        return (hasName && hasGender) ? 'menu' : 'create_profile';
      };

      const handleVideoEnd = () => {
        const next = getNextScreenAfterOpening();
        setScreen(next);
        setIsBgmPlaying(true);
      };
      
      const [completedPuzzles, setCompletedPuzzles] = useState(() => {
        try {
          const saved = localStorage.getItem('bible_quiz_completed');
          if (saved) {
            const parsed = JSON.parse(saved);
            if (Array.isArray(parsed)) return parsed;
          }
        } catch (e) {
          console.error(e);
        }
        return [];
      });

      const activateAdminMode = (inputPw) => {
        if (inputPw === '9570') {
          const allStages = ['puzzle-001', 'puzzle-002', 'puzzle-003', 'puzzle-004', 'puzzle-005', 'puzzle-006', 'puzzle-007'];
          setCompletedPuzzles(allStages);
          localStorage.setItem('bible_quiz_completed', JSON.stringify(allStages));
          synth.playSuccess();
          alert('🔑 관리자 모드 활성화! 모든 스테이지가 해금되었습니다.');
          return true;
        } else {
          synth.playO();
          alert('❌ 비밀번호가 올바르지 않습니다.');
          return false;
        }
      };

      const [coins, setCoins] = useState(() => {
        try {
          const saved = localStorage.getItem('bible_quiz_coins');
          if (saved !== null) {
            const parsed = parseInt(saved, 10);
            if (!isNaN(parsed)) return parsed;
          }
        } catch (e) {
          console.error(e);
        }
        return 30; // Start with 30 coins
      });

      const [isSolved, setIsSolved] = useState(false);
      const [solvedPuzzleId, setSolvedPuzzleId] = useState(null);
      const [solvedAnimation, setSolvedAnimation] = useState(false);
      const [lastEarnedScore, setLastEarnedScore] = useState(0);

      const [totalScore, setTotalScore] = useState(() => {
        try {
          const saved = localStorage.getItem('bible_quiz_score');
          if (saved !== null) {
            const parsed = parseInt(saved, 10);
            if (!isNaN(parsed)) return parsed;
          }
        } catch (e) {}
        return 0;
      });

      // Rankings: array of { name, score, date }
      const [rankings, setRankings] = useState(() => {
        try {
          const saved = localStorage.getItem('bible_quiz_rankings');
          if (saved) {
            const parsed = JSON.parse(saved);
            if (Array.isArray(parsed)) return parsed;
          }
        } catch (e) {}
        return [];
      });

      const [isBgmPlaying, setIsBgmPlaying] = useState(true);
      const titleBgmRef = useRef(null);
      const mapBgmRef = useRef(null);
      const gameBgmRef = useRef(null);
      const scmBgmRef = useRef(null);

      // Play appropriate BGM based on screen state and toggle
      useEffect(() => {
        if (!titleBgmRef.current || !mapBgmRef.current || !gameBgmRef.current || !scmBgmRef.current) return;
        
        if (isBgmPlaying) {
          if (screen === 'create_profile') {
            titleBgmRef.current.pause();
            mapBgmRef.current.pause();
            gameBgmRef.current.pause();
            scmBgmRef.current.play().catch(e => console.warn("SCM BGM blocked:", e));
          } else if (screen === 'menu') {
            scmBgmRef.current.pause();
            mapBgmRef.current.pause();
            gameBgmRef.current.pause();
            titleBgmRef.current.play().catch(e => console.warn("Title BGM blocked:", e));
          } else if (screen === 'list') {
            scmBgmRef.current.pause();
            titleBgmRef.current.pause();
            gameBgmRef.current.pause();
            mapBgmRef.current.play().catch(e => console.warn("Map BGM blocked:", e));
          } else if (screen === 'game') {
            scmBgmRef.current.pause();
            titleBgmRef.current.pause();
            mapBgmRef.current.pause();
            gameBgmRef.current.play().catch(e => console.warn("Game BGM blocked:", e));
          }
        } else {
          scmBgmRef.current.pause();
          titleBgmRef.current.pause();
          mapBgmRef.current.pause();
          gameBgmRef.current.pause();
        }
      }, [isBgmPlaying, screen]);

      // Bypassing browser autoplay blocking on first page click interaction
      useEffect(() => {
        const handleFirstClick = () => {
          if (!isBgmPlaying) return;
          if (screen === 'create_profile' && scmBgmRef.current) {
            scmBgmRef.current.play().catch(e => console.warn("SCM BGM trigger error:", e));
          } else if (screen === 'menu' && titleBgmRef.current) {
            titleBgmRef.current.play().catch(e => console.warn("Title BGM trigger error:", e));
          } else if (screen === 'list' && mapBgmRef.current) {
            mapBgmRef.current.play().catch(e => console.warn("Map BGM trigger error:", e));
          } else if (screen === 'game' && gameBgmRef.current) {
            gameBgmRef.current.play().catch(e => console.warn("Game BGM trigger error:", e));
          }
          window.removeEventListener('click', handleFirstClick);
        };
        window.addEventListener('click', handleFirstClick);
        return () => window.removeEventListener('click', handleFirstClick);
      }, [screen, isBgmPlaying]);

      const puzzlesList = [
        { id: 'puzzle-001', num: '001', name: '스테이지 1: 빛과 어둠의 분리', picarats: 30, locked: false },
        { id: 'puzzle-002', num: '002', name: '스테이지 2: 에덴동산의 동물들', picarats: 35, locked: false },
        { id: 'puzzle-003', num: '003', name: '스테이지 3: 아담의 바구니', picarats: 40, locked: false },
        { id: 'puzzle-004', num: '004', name: '스테이지 4: 방주의 잃어버린 짝', picarats: 45, locked: true },
        { id: 'puzzle-005', num: '005', name: '스테이지 5: 바벨탑과 흩어진 인류', picarats: 50, locked: true },
        { id: 'puzzle-006', num: '006', name: '스테이지 6: 아브라함과 믿음의 제단', picarats: 55, locked: true },
        { id: 'puzzle-007', num: '007', name: '스테이지 7: 이삭과 야곱', picarats: 60, locked: true },
      ];

      const navigateTo = (targetScreen) => {
        synth.playClick();
        setScreen(targetScreen);
      };

      const handleSpendCoins = (amount) => {
        const nextCoins = Math.max(0, coins - amount);
        setCoins(nextCoins);
        localStorage.setItem('bible_quiz_coins', nextCoins.toString());
      };

      const handleAddCoins = (amount) => {
        const nextCoins = coins + amount;
        setCoins(nextCoins);
        localStorage.setItem('bible_quiz_coins', nextCoins.toString());
      };

      const handlePuzzleSolved = (puzzleId, bonusScore = 0) => {
        synth.playSuccess();
        setSolvedPuzzleId(puzzleId);
        setIsSolved(true);
        setSolvedAnimation(true);

        confetti({
          particleCount: 100,
          spread: 70,
          origin: { y: 0.6 }
        });

        // Calculate earned score
        const puzzle = puzzlesList.find(p => p.id === puzzleId);
        const baseScore = puzzle ? puzzle.picarats : 30;
        const earnedScore = baseScore + bonusScore;
        setLastEarnedScore(earnedScore);

        if (!completedPuzzles.includes(puzzleId)) {
          // 처음 클리어할 때만 점수 적립
          const nextScore = totalScore + earnedScore;
          setTotalScore(nextScore);
          localStorage.setItem('bible_quiz_score', nextScore.toString());

          const updatedCompleted = [...completedPuzzles, puzzleId];
          setCompletedPuzzles(updatedCompleted);
          localStorage.setItem('bible_quiz_completed', JSON.stringify(updatedCompleted));
          handleAddCoins(20); // Earn 20 coins on first clear!

          // 랭킹: 같은 이름 플레이어 항목을 업데이트 (1인 1항목)
          const myEntry = {
            name: profileName,
            gender: profileGender,
            score: nextScore,
            cleared: updatedCompleted.length,
            date: new Date().toLocaleDateString('ko-KR'),
          };
          const otherEntries = rankings.filter(r => r.name !== profileName);
          const updatedRankings = [...otherEntries, myEntry]
            .sort((a, b) => b.score - a.score)
            .slice(0, 10);
          setRankings(updatedRankings);
          localStorage.setItem('bible_quiz_rankings', JSON.stringify(updatedRankings));
        }
      };

      const handleResetScore = () => {
        setTotalScore(0);
        localStorage.setItem('bible_quiz_score', '0');
      };

      const handleResetAllProgress = () => {
        if (confirm('모든 진행 상황과 클리어 기록을 초기화하시겠습니까?')) {
          localStorage.removeItem('bible_quiz_completed');
          localStorage.removeItem('bible_quiz_coins');
          localStorage.removeItem('bible_quiz_profile_name');
          localStorage.removeItem('bible_quiz_profile_gender');
          localStorage.removeItem('bible_quiz_score');
          localStorage.removeItem('bible_quiz_rankings');
          setCompletedPuzzles([]);
          setCoins(30);
          setTotalScore(0);
          setRankings([]);
          setProfileName('');
          setProfileGender('');
          setIsSolved(false);
          setSolvedPuzzleId(null);
          setSolvedAnimation(false);
          synth.playThud();
          setScreen('opening');
        }
      };

      return (
        <div className="game-container relative bg-[#120d08] overflow-hidden flex flex-col paper-texture select-none">
          
          {/* Background Music Audio elements */}
          <audio ref={titleBgmRef} src="bgm.mp3" loop />
          <audio ref={mapBgmRef} src="bgm1.mp3" loop />
          <audio ref={gameBgmRef} src="1gamebg.mp3" loop />
          <audio ref={scmBgmRef} src="scm.mp3" loop />

          {/* Gold Framing Decor */}
          <div className="absolute inset-1.5 border-2 border-layton-gold opacity-80 rounded-2xl pointer-events-none z-30"></div>
          <div className="absolute inset-0 vignette-effect z-20"></div>
 
          {/* SCREEN -1: OPENING VIDEO SCREEN */}
          {screen === 'opening' && (
            <div 
              className="flex-1 bg-black z-40 fade-in relative flex flex-col justify-center select-none"
            >
              <video 
                ref={videoRef}
                src="opm.mp4" 
                autoPlay 
                muted={isVideoMuted}
                playsInline
                onEnded={handleVideoEnd}
                onClick={handleVideoEnd}
                className="w-full h-full object-contain cursor-pointer"
              />
              
              {/* Skip Notice overlay */}
              <div 
                onClick={handleVideoEnd}
                className="absolute top-4 right-4 bg-black/60 text-white font-layton-myeongjo text-[8px] font-bold py-1 px-2.5 rounded-full border border-white/20 z-50 cursor-pointer hover:bg-black/80"
              >
                건너뛰기 ⏩
              </div>

              {/* Unmute button */}
              {isVideoMuted && (
                <button
                  onClick={(e) => {
                    e.stopPropagation();
                    setIsVideoMuted(false);
                    synth.init();
                    if (videoRef.current) {
                      videoRef.current.muted = false;
                      videoRef.current.play().catch(e => console.warn(e));
                    }
                  }}
                  className="absolute bottom-6 left-1/2 transform -translate-x-1/2 bg-[#e7b85e] border-2 border-[#ffe8b5] text-[#2c1a0c] font-black font-layton-myeongjo text-[9px] px-4 py-2 rounded-full z-50 flex items-center gap-1 shadow-lg animate-pulse hover:scale-105 active:scale-95 transition-all"
                >
                  🔊 인트로 소리 켜기
                </button>
              )}
            </div>
          )}

          {/* SCREEN 0: CREATE PROFILE SCREEN */}
          {screen === 'create_profile' && (
            <div className="flex-1 flex flex-col justify-between p-6 z-10 fade-in text-center relative bg-[#1e140a]/95 select-none">
              
              {/* Decorative vintage frame */}
              <div className="absolute inset-4 border-2 border-layton-gold/40 rounded-xl pointer-events-none z-0"></div>

              {/* Top right BGM toggle button */}
              <div className="absolute top-6 right-6 z-30 font-layton-myeongjo">
                <button
                  onClick={() => {
                    synth.playClick();
                    setIsBgmPlaying(prev => !prev);
                  }}
                  className="text-[10px] text-yellow-300 hover:text-yellow-200 font-bold bg-[#36200c]/85 px-2.5 py-1 rounded-full border border-layton-gold/40 shadow-md"
                >
                  {isBgmPlaying ? '🎵 음악 켬' : '🔇 음악 끎'}
                </button>
              </div>

              {/* Title Section */}
              <div className="mt-4 z-10">
                <h1 className="font-layton-myeongjo font-black text-xl text-layton-amber tracking-wider drop-shadow-md">
                  모험가 등록
                </h1>
                <p className="font-layton-myeongjo text-[10px] text-layton-cream/80 mt-1 break-keep">
                  성경 퍼즐 나라를 탐험할 당신의 정보와 캐릭터를 선택해주세요!
                </p>
              </div>

              {/* Name Input Form */}
              <div className="z-10 px-2 my-2">
                <label className="block text-[10px] font-bold text-layton-gold/80 font-layton-myeongjo mb-1.5 text-left">
                  ✍️ 모험가 이름 (최대 8자)
                </label>
                <input
                  type="text"
                  maxLength={8}
                  value={profileName}
                  onChange={(e) => {
                    setProfileName(e.target.value.trim());
                    if (!isBgmPlaying) setIsBgmPlaying(true);
                  }}
                  placeholder="모험가의 이름을 입력하세요"
                  className="w-full py-2 px-3 bg-[#fcf8eb] border-2 border-[#8b5a2b] text-layton-dark font-layton-myeongjo font-bold text-center text-xs rounded-xl shadow-inner focus:outline-none focus:border-layton-gold transition-colors"
                />
              </div>

              {/* Character Selection Cards */}
              <div className="z-10 flex gap-4 justify-center my-1">
                {/* BOY CARD */}
                <button
                  onClick={() => {
                    synth.playClick();
                    setProfileGender('boy');
                    if (!isBgmPlaying) setIsBgmPlaying(true);
                  }}
                  className={`flex-1 p-2 bg-[#2d1f11]/90 rounded-2xl border-2 flex flex-col items-center justify-between transition-all duration-300 relative group overflow-hidden ${
                    profileGender === 'boy' 
                      ? 'border-layton-gold bg-[#4a2f13]/40 shadow-[0_0_15px_rgba(255,215,0,0.4)] scale-105' 
                      : 'border-layton-gold/20 opacity-60 hover:opacity-90 hover:scale-[1.02]'
                  }`}
                >
                  <div className="h-28 w-full flex items-center justify-center overflow-hidden">
                    <img 
                      src="boy.png" 
                      className="h-full object-contain object-top" 
                      alt="Boy Explorer"
                    />
                  </div>
                  <span className="font-layton-myeongjo text-[11px] font-black text-layton-cream mt-1">
                    남자 모험가
                  </span>
                  {profileGender === 'boy' && (
                    <div className="absolute top-1.5 right-1.5 bg-layton-gold text-[#2c1a0c] w-4 h-4 rounded-full flex items-center justify-center text-[10px] font-bold shadow-md animate-pulse">
                      ✓
                    </div>
                  )}
                </button>

                {/* GIRL CARD */}
                <button
                  onClick={() => {
                    synth.playClick();
                    setProfileGender('girl');
                    if (!isBgmPlaying) setIsBgmPlaying(true);
                  }}
                  className={`flex-1 p-2 bg-[#2d1f11]/90 rounded-2xl border-2 flex flex-col items-center justify-between transition-all duration-300 relative group overflow-hidden ${
                    profileGender === 'girl' 
                      ? 'border-layton-gold bg-[#4a2f13]/40 shadow-[0_0_15px_rgba(255,215,0,0.4)] scale-105' 
                      : 'border-layton-gold/20 opacity-60 hover:opacity-90 hover:scale-[1.02]'
                  }`}
                >
                  <div className="h-28 w-full flex items-center justify-center overflow-hidden">
                    <img 
                      src="girl.png" 
                      className="h-full object-contain object-top" 
                      alt="Girl Explorer"
                    />
                  </div>
                  <span className="font-layton-myeongjo text-[11px] font-black text-layton-cream mt-1">
                    여자 모험가
                  </span>
                  {profileGender === 'girl' && (
                    <div className="absolute top-1.5 right-1.5 bg-layton-gold text-[#2c1a0c] w-4 h-4 rounded-full flex items-center justify-center text-[10px] font-bold shadow-md animate-pulse">
                      ✓
                    </div>
                  )}
                </button>
              </div>

              {/* Start Adventure Button */}
              <div className="mb-4 z-10">
                <button
                  disabled={!profileName.trim() || !profileGender}
                  onClick={() => {
                    synth.playSuccess();
                    localStorage.setItem('bible_quiz_profile_name', profileName);
                    localStorage.setItem('bible_quiz_profile_gender', profileGender);
                    setCoins(30);
                    localStorage.setItem('bible_quiz_coins', '30');
                    navigateTo('menu');
                  }}
                  className={`w-full py-2.5 bg-gradient-to-b from-[#e7b85e] to-[#ab7418] hover:from-[#f7cb75] hover:to-[#be8420] text-[#2c1a0c] font-black font-layton-myeongjo text-xs rounded-xl border-2 border-[#ffe8b5] shadow-lg transition-all duration-200 ${
                    (!profileName.trim() || !profileGender) 
                      ? 'opacity-40 cursor-not-allowed pointer-events-none' 
                      : 'hover:scale-[1.02] active:scale-95'
                  }`}
                >
                  🧭 모험 임명장 생성 및 출발!
                </button>
              </div>

            </div>
          )}

          {/* SCREEN 1: MAIN MENU TITLE */}
          {screen === 'menu' && (
            <div 
              className="flex-1 flex flex-col justify-end p-6 z-10 fade-in text-center relative bg-cover bg-center bg-no-repeat"
              style={{ backgroundImage: "url('main_bg.png')" }}
            >
              {/* Profile Badge in Top Header */}
              <div className="absolute top-8 left-4 right-4 bg-[#36200c]/85 border-2 border-layton-gold py-1.5 px-3 rounded-2xl shadow-lg z-20 flex justify-between items-center">
                <div className="text-left font-layton-myeongjo">
                  <span className="text-[7px] bg-amber-500 text-stone-900 font-extrabold px-1.5 py-0.2 rounded-full uppercase font-sans">
                    EXPLORER
                  </span>
                  <h3 className="font-layton-myeongjo font-bold text-xs text-layton-cream mt-0.5">
                    {profileGender === 'girl' ? '👧' : '👦'} {profileName} 모험가
                  </h3>
                </div>
                <div className="text-right font-layton-myeongjo">
                  <div className="text-[9px] text-yellow-300 font-bold">🪙 {coins}개</div>
                  <div className="text-[9px] text-amber-400 font-bold">⭐ {totalScore}점</div>
                </div>
              </div>

              {/* Selected Character standee in middle-center (aligned with background gate) */}
              <div className="absolute bottom-[185px] left-1/2 -translate-x-1/2 w-32 h-52 pointer-events-none z-10 animate-[walk-bob_4s_infinite_alternate]">
                <img 
                  src={profileGender === 'girl' ? 'girl.png' : 'boy.png'} 
                  className="w-full h-full object-contain"
                  alt="Explorer Avatar"
                />
              </div>

              <div className="flex flex-col gap-2.5 mb-4 z-20 max-w-[240px] w-full mx-auto">
                <button
                  onClick={() => navigateTo('list')}
                  className="w-full py-2.5 bg-gradient-to-b from-[#e7b85e] to-[#ab7418] hover:from-[#f7cb75] hover:to-[#be8420] text-[#2c1a0c] font-black font-layton-myeongjo text-[13px] rounded-xl border-2 border-[#ffe8b5] shadow-[0_4px_10px_rgba(0,0,0,0.6)] hover:scale-[1.02] active:scale-95 transition-all duration-200 text-center"
                >
                  📖 성경 탐험 시작하기
                </button>

                <div className="flex gap-2">
                  <button
                    onClick={() => navigateTo('list')}
                    className="flex-1 py-2.5 bg-gradient-to-b from-[#5c4a3c] to-[#3a2c20] hover:from-[#6d5747] hover:to-[#453426] text-layton-cream font-bold font-layton-myeongjo text-[11px] rounded-xl border border-layton-gold/40 shadow-[0_4px_8px_rgba(0,0,0,0.5)] hover:scale-[1.02] active:scale-95 transition-all duration-200 flex justify-center items-center gap-1"
                  >
                    🗺️ 성경 지도
                  </button>
                  <button
                    onClick={() => navigateTo('ranking')}
                    className="flex-1 py-2.5 bg-gradient-to-b from-[#4a3a6e] to-[#2d2248] hover:from-[#5a4a7e] hover:to-[#3d3258] text-yellow-200 font-bold font-layton-myeongjo text-[11px] rounded-xl border border-purple-400/40 shadow-[0_4px_8px_rgba(0,0,0,0.5)] hover:scale-[1.02] active:scale-95 transition-all duration-200 flex justify-center items-center gap-1"
                  >
                    🏆 랭킹
                  </button>
                </div>

                <div className="flex justify-between items-center px-1 mt-1 text-white font-layton-myeongjo drop-shadow-[0_2px_4px_rgba(0,0,0,1)]">
                  <button
                    onClick={() => setIsBgmPlaying(prev => !prev)}
                    className="text-[9px] text-yellow-300 hover:text-yellow-200 font-bold"
                  >
                    {isBgmPlaying ? '🎵 음악 켬' : '🔇 음악 끎'}
                  </button>
                  <span className="text-stone-500 text-[9px]">|</span>
                  <button
                    onClick={handleResetAllProgress}
                    className="text-[9px] text-red-300 hover:text-red-200 font-bold hover:underline"
                  >
                    초기화 🔄
                  </button>
                </div>
              </div>
            </div>
          )}

          {/* SCREEN: RANKING LEADERBOARD */}
          {screen === 'ranking' && (
            <div className="flex-1 flex flex-col z-10 fade-in bg-[#0f0a06] relative overflow-hidden">
              {/* Decorative gold border */}
              <div className="absolute inset-4 border border-layton-gold/20 rounded-2xl pointer-events-none z-0" />

              {/* Header */}
              <div className="bg-[#36200c] border-b-2 border-layton-gold px-4 py-3 flex items-center justify-between z-10">
                <button
                  onClick={() => navigateTo('menu')}
                  className="text-[9px] text-layton-amber font-bold font-layton-myeongjo hover:text-yellow-300"
                >
                  ◀ 메인 메뉴
                </button>
                <h2 className="font-layton-myeongjo font-black text-layton-amber text-sm tracking-wider">🏆 명예의 전당</h2>
                <div className="text-[9px] text-yellow-300 font-layton-myeongjo font-bold">⭐ 내 점수: {totalScore}</div>
              </div>

              {/* Score legend */}
              <div className="mx-4 mt-3 mb-2 bg-[#1e140a]/80 border border-layton-gold/20 rounded-xl p-3 z-10">
                <h3 className="font-layton-myeongjo font-bold text-[10px] text-layton-amber mb-2">📋 점수 획득 방법</h3>
                <div className="grid grid-cols-2 gap-1.5 text-[9px] text-layton-cream/80 font-layton-myeongjo">
                  <div className="flex items-center gap-1">💡 스테이지 1 클리어<span className="ml-auto text-yellow-300 font-bold">+30P</span></div>
                  <div className="flex items-center gap-1">🦁 스테이지 2 클리어<span className="ml-auto text-yellow-300 font-bold">+35P</span></div>
                  <div className="flex items-center gap-1 col-span-2 border-t border-layton-gold/15 pt-1.5 mt-0.5">🎯 터치 절약 보너스 (스테이지 2)<span className="ml-auto text-emerald-300 font-bold">최대+65P</span></div>
                  <div className="flex items-center gap-1 col-span-2">⚡ 속도 보너스 (스테이지 1)<span className="ml-auto text-sky-300 font-bold">최대+20P</span></div>
                </div>
              </div>

              {/* Ranking List */}
              <div className="flex-1 overflow-y-auto px-4 pb-4 z-10">
                {rankings.length === 0 ? (
                  <div className="flex flex-col items-center justify-center h-full gap-3 opacity-60">
                    <span className="text-5xl">🏅</span>
                    <p className="font-layton-myeongjo text-layton-cream/60 text-xs text-center break-keep">
                      아직 기록이 없어요.<br />스테이지를 클리어해서 첫 번째 탐험가가 되어보세요!
                    </p>
                  </div>
                ) : (
                  <div className="flex flex-col gap-2">
                    {rankings.map((entry, idx) => {
                      const medal = idx === 0 ? '🥇' : idx === 1 ? '🥈' : idx === 2 ? '🥉' : `${idx + 1}.`;
                      const isMe = entry.name === profileName;
                      return (
                        <div
                          key={idx}
                          className={`flex items-center gap-3 px-3 py-2.5 rounded-xl border ${
                            isMe
                              ? 'bg-amber-500/15 border-layton-gold/60'
                              : 'bg-[#1e140a]/60 border-layton-gold/15'
                          }`}
                        >
                          <span className="text-lg w-7 text-center flex-none">{medal}</span>

                          <path d="M 30,75 L 90,75 L 80,45 L 40,45 Z" fill="#d97706" opacity="0.6"/>
                          <path d="M 40,45 L 80,45 L 72,25 L 48,25 Z" fill="#b45309" opacity="0.7"/>
                          <line x1="15" y1="30" x2="30" y2="45" stroke="#9a3412" strokeWidth="2" strokeDasharray="3,3" />
                          <line x1="105" y1="30" x2="90" y2="45" stroke="#9a3412" strokeWidth="2" strokeDasharray="3,3" />
                          <circle cx="60" cy="18" r="3" fill="#eab308" />
                        </svg>
                      </div>

                      <p className="font-layton-myeongjo text-[11px] leading-relaxed text-layton-dark font-medium text-justify break-keep mb-3">
                        바벨탑 사건의 원인은 단순히 높은 건축물을 지었기 때문이 아닙니다. 하나님을 높이고 그 뜻을 펴기보다, 인간 스스로의 힘으로 하늘에 닿아 자신들의 '이름'을 세상에 널리 높이고 흩어짐을 면하려 했던 교만함이었습니다.
                      </p>

                      <blockquote className="border-l-2 border-amber-600 pl-2 py-0.5 bg-amber-50/50 mb-3">
                        <p className="font-layton-myeongjo text-[11px] font-bold text-amber-800 italic leading-relaxed break-keep font-layton-myeongjo">
                          "하나님께서는 인간의 언어를 흩으사 이들의 교만과 죄의 폭주를 막으시고, 온 땅으로 퍼져 번성하라는 본래의 약속을 은혜 가운데 강제 성취하셨습니다."
                        </p>
                      </blockquote>

                      <p className="font-layton-myeongjo text-[11px] leading-relaxed text-layton-dark font-medium text-justify break-keep">
                        우리는 인생에서 내 이름으로 바벨탑을 쌓아 올리며 자랑하려 하지는 않는지 되돌아봅니다. 나의 성공과 연합이 나를 드러내는 도구가 되기보다, 온전히 주님의 이름을 높이고 세상을 널리 이롭게 하는 청지기로 살아갑니다.
                      </p>
                    </div>
                  ) : solvedPuzzleId === 'puzzle-006' ? (
                    // Abraham Faith reflection
                    <div>
                      <div className="text-center border-b border-layton-brown/30 pb-2 mb-3 font-layton-myeongjo">
                        <span className="text-[10px] text-layton-lightbrown font-bold tracking-wider uppercase">Theological Puzzle Reflection</span>
                        <h4 className="font-layton-myeongjo font-black text-sm text-layton-brown mt-0.5">믿음의 순종 : 알지 못해도 떠나는 용기</h4>
                      </div>

                      <div className="w-full flex justify-center py-2 mb-2 bg-[#fef5e7] border border-layton-brown/10 rounded-lg">
                        <svg width="90" height="60" viewBox="0 0 120 90" xmlns="http://www.w3.org/2000/svg">
                          <rect width="120" height="90" fill="#fef5e7" rx="8" />
                          <circle cx="60" cy="20" r="12" fill="#fcd34d" opacity="0.9"/>
                          <line x1="60" y1="32" x2="60" y2="70" stroke="#78350f" strokeWidth="3"/>
                          <line x1="60" y1="45" x2="45" y2="58" stroke="#78350f" strokeWidth="2"/>
                          <line x1="60" y1="45" x2="75" y2="58" stroke="#78350f" strokeWidth="2"/>
                          <path d="M 20,65 Q 60,50 100,65" stroke="#d97706" strokeWidth="2" fill="none" strokeDasharray="4,3"/>
                          <text x="50" y="82" fontSize="9" fill="#92400e">가나안</text>
                        </svg>
                      </div>

                      <p className="font-layton-myeongjo text-[11px] leading-relaxed text-layton-dark font-medium text-justify break-keep mb-3">
                        아브라함은 목적지를 정확히 알지 못했습니다. 그러나 하나님께서 "가라"고 말씀하셨을 때, 그는 의심 없이 길을 떠났습니다. 그 순종은 믿음에서 비롯된 것이었습니다.
                      </p>

                      <blockquote className="border-l-2 border-yellow-600 pl-2 py-0.5 bg-yellow-50/50 mb-3">
                        <p className="font-layton-myeongjo text-[11px] font-bold text-yellow-800 italic leading-relaxed break-keep font-layton-myeongjo">
                          "믿음으로 아브라함은 부르심을 받았을 때 순종하여 장래의 유업으로 받을 땅에 나아갔으며 갈 바를 알지 못하고 나아갔더라." (히브리서 11:8)
                        </p>
                      </blockquote>

                      <p className="font-layton-myeongjo text-[11px] leading-relaxed text-layton-dark font-medium text-justify break-keep">
                        우리도 때로 앞이 보이지 않는 길 앞에 서게 됩니다. 아브라함처럼 하나님의 약속을 붙잡고, 알지 못해도 한 걸음 내딛는 믿음의 용기를 배웁니다.
                      </p>
                    </div>
                  ) : solvedPuzzleId === 'puzzle-007' ? (
                    // Isaac and Jacob reflection
                    <div>
                      <div className="text-center border-b border-layton-brown/30 pb-2 mb-3 font-layton-myeongjo">
                        <span className="text-[10px] text-layton-lightbrown font-bold tracking-wider uppercase">Theological Puzzle Reflection</span>
                        <h4 className="font-layton-myeongjo font-black text-sm text-layton-brown mt-0.5">정직한 믿음 : 거짓말이 가져온 상처</h4>
                      </div>

                      <div className="w-full flex justify-center py-2 mb-2 bg-[#fef5e7] border border-layton-brown/10 rounded-lg">
                        <svg width="90" height="60" viewBox="0 0 120 90" xmlns="http://www.w3.org/2000/svg">
                          <rect width="120" height="90" fill="#fef5e7" rx="8" />
                          <path d="M 10,75 L 110,75 L 90,20 L 30,20 Z" fill="#d97706" opacity="0.3"/>
                          <circle cx="45" cy="35" r="10" fill="#fcd34d" opacity="0.8"/>
                          <circle cx="75" cy="35" r="10" fill="#d4a373" opacity="0.8"/>
                          <path d="M 55,35 L 65,35" stroke="#ef4444" strokeWidth="3" strokeDasharray="3,2"/>
                          <text x="48" y="65" fontSize="10" fill="#92400e">야곱</text>
                          <text x="68" y="65" fontSize="10" fill="#92400e">에서</text>
                        </svg>
                      </div>

                      <p className="font-layton-myeongjo text-[11px] leading-relaxed text-layton-dark font-medium text-justify break-keep mb-3">
                        하나님께서는 야곱을 통해 약속을 이어가실 계획을 가지고 계셨어요. 그러나 야곱과 리브가는 하나님을 기다리지 않고 속이는 방법을 사용했어요. 그 결과 가족 안에 큰 상처와 갈등이 생겼어요.
                      </p>

                      <blockquote className="border-l-2 border-amber-700 pl-2 py-0.5 bg-amber-50/50 mb-3">
                        <p className="font-layton-myeongjo text-[11px] font-bold text-amber-800 italic leading-relaxed break-keep font-layton-myeongjo">
                          "음성은 야곱의 음성이나 손은 에서의 손이로다." (창세기 27:22)
                        </p>
                      </blockquote>

                      <p className="font-layton-myeongjo text-[11px] leading-relaxed text-layton-dark font-medium text-justify break-keep">
                        하나님의 뜻은 거짓말이 아니라 정직한 믿음과 순종으로 따라야 해요. 우리는 하나님을 기다리며 정직하게 행동하는 사람이 됩시다.
                      </p>
                    </div>
                  ) : solvedPuzzleId === 'puzzle-008' ? (
                    // Five Loaves and Two Fish reflection
                    <div>
                      <div className="text-center border-b border-layton-brown/30 pb-2 mb-3 font-layton-myeongjo">
                        <span className="text-[10px] text-layton-lightbrown font-bold tracking-wider uppercase">Theological Puzzle Reflection</span>
                        <h4 className="font-layton-myeongjo font-black text-sm text-layton-brown mt-0.5">나눔의 비결 : 쪼개어지는 축복</h4>
                      </div>

                      <div className="w-full flex justify-center py-2 mb-2 bg-[#f0ebd7] border border-layton-brown/10 rounded-lg">
                        <svg width="90" height="60" viewBox="0 0 120 90" xmlns="http://www.w3.org/2000/svg">
                          <ellipse cx="60" cy="55" rx="35" ry="18" fill="#d4a373" stroke="#8b5a2b" strokeWidth="2.5"/>
                          <circle cx="50" cy="46" r="8" fill="#ffd700" opacity="0.9"/>
                          <circle cx="70" cy="48" r="7" fill="#ffd700" opacity="0.9"/>
                          <circle cx="60" cy="43" r="9" fill="#f5ead6" stroke="#814109" strokeWidth="1.5"/>
                          <path d="M 60,20 L 60,50 M 50,30 L 70,30" stroke="#e6a817" strokeWidth="3" strokeLinecap="round" opacity="0.85"/>
                          <ellipse cx="60" cy="55" rx="35" ry="8" fill="#e5ba90" stroke="#8b5a2b" strokeWidth="1" opacity="0.3"/>
                        </svg>
                      </div>

                      <p className="font-layton-myeongjo text-[11px] leading-relaxed text-layton-dark font-medium text-justify break-keep mb-3">
                        세상의 지혜는 움켜쥐고(더하기) 곱해서 자산을 불릴 때 부요함이 찾아온다고 말합니다.
                        하지만 하늘나라의 기적은 오직 우리가 가진 가장 크고 소중한 것(Lv5)을 주님의 손에 올리고, 기꺼이 쪼개고 나눌 때 일어납니다.
                      </p>

                      <blockquote className="border-l-2 border-red-700 pl-2 py-0.5 bg-red-50/50 mb-3">
                        <p className="font-layton-myeongjo text-[11px] font-bold text-red-800 italic leading-relaxed break-keep font-layton-myeongjo">
                          "보리떡과 물고기가 더 작게 나누어지고 쪼개어질 때, 오히려 5천 명을 먹이고도 12바구니가 가득 차 흐릅니다."
                        </p>
                      </blockquote>

                      <p className="font-layton-myeongjo text-[11px] leading-relaxed text-layton-dark font-medium text-justify break-keep">
                        나를 쪼개어 타인을 채우는 '나눔의 신비'. 내가 작아지고 소외될 때 주님의 손을 통해
                        오히려 만물이 풍성해지는 오병이어의 반전 법칙이야말로 하나님께서 세상을 돌보시는 사랑의 원리입니다.
                      </p>
                    </div>
                  ) : (
                    <div className="text-center text-layton-lightbrown font-layton-myeongjo text-[11px] py-4">
                      <p>말씀을 마음에 새겨보세요.</p>
                    </div>
                  )}
                </div>

                <div className="mt-4 flex flex-col gap-2">
                  <div className="bg-yellow-100 border border-yellow-300 text-yellow-800 text-[10px] text-center font-bold font-sans py-1 rounded font-layton-myeongjo">
                    ★ PICARATS +{solvedPuzzleId === 'puzzle-001' ? '30' : solvedPuzzleId === 'puzzle-002' ? '35' : solvedPuzzleId === 'puzzle-003' ? '40' : solvedPuzzleId === 'puzzle-004' ? '45' : solvedPuzzleId === 'puzzle-005' ? '50' : '40'} ACQUIRED ★
                  </div>

                  <button
                    onClick={() => {
                      setIsSolved(false);
                      setSolvedPuzzleId(null);
                      setSolvedAnimation(false);
                      navigateTo('list');
                    }}
                    className="w-full py-2 bg-gradient-to-b from-layton-amber to-amber-600 hover:from-yellow-400 hover:to-amber-500 text-layton-dark font-bold font-layton-myeongjo text-xs rounded-xl border border-layton-gold shadow-md active:scale-95 transition-all text-center font-layton-myeongjo"
                  >
                    도감 목록으로 돌아가기 🗂️
                  </button>
                </div>
              </div>

            </div>
          )}

        </div>
      );
    }

    const container = document.getElementById('root');
    const root = ReactDOM.createRoot(container);
    root.render(<App />);
  </script>
</body>
