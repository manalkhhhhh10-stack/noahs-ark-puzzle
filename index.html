                    {/* Bible Verse in beautiful Myeongjo Font */}
                    <div className="p-3 bg-[#ebdcb9]/40 border border-[#8b5a2b]/20 rounded-xl my-2">
                      <p className="font-layton-myeongjo text-[11px] font-extrabold text-[#3a200c] leading-relaxed break-keep">
                        "하나님이 이르시되 빛이 있으라 하시니 빛이 있었고"
                      </p>
                      <span className="font-layton-myeongjo text-[8px] text-[#8b5a2b] font-bold mt-1 block">
                        (창세기 1:3)
                      </span>
                    </div>
                  </div>

                  <div className="mt-3 mb-3 bg-gradient-to-r from-sky-900/50 to-sky-800/30 border border-sky-500/40 rounded-xl p-2.5 text-center">
                    <div className="text-[10px] text-sky-300 font-bold font-layton-myeongjo">🏆 획득 점수</div>
                    <div className="flex items-baseline justify-center gap-2 mt-0.5">
                      <span className="text-yellow-200 font-black text-sm font-layton-myeongjo">+30P</span>
                      <span className="text-sky-300 font-black text-sm font-layton-myeongjo">+{Math.min(20, Math.round(timeLeft * 1.3))}P 속도보너스!</span>
                    </div>
                    <div className="text-[9px] text-white/40 font-layton-myeongjo mt-0.5">남은 시간 {timeLeft}초 × 1.3 = 속도 보너스</div>
                  </div>

                  <div className="mt-4">
                    <button
                      onClick={() => {
                        synth.playSuccess();
                        const speedBonus = Math.min(20, Math.round(timeLeft * 1.3));
                        onSolved('puzzle-001', speedBonus);
                      }}
                      className="w-full py-2 bg-gradient-to-b from-[#e7b85e] to-[#ab7418] hover:from-[#f7cb75] hover:to-[#be8420] text-[#2c1a0c] font-black font-layton-myeongjo text-xs rounded-xl border-2 border-[#ffe8b5] shadow-md transition-all duration-200 hover:scale-[1.02] active:scale-95"
                    >
                      다음 단계로 🧭
                    </button>
                  </div>
                </div>

              </div>
            )}

          </div>

          {/* ================= MODALS & OVERLAYS ================= */}

          {/* Hint modal popup */}
          {showHint && (
            <div className="absolute inset-0 bg-black/60 flex items-center justify-center p-6 z-50 fade-in">
              <div className="w-[280px] bg-layton-parchment rounded-2xl border-4 border-layton-brown p-4 text-center shadow-2xl relative solved-banner">
                <span className="text-2xl block mb-1">💡</span>
                <h3 className="font-layton-myeongjo font-black text-xs text-layton-dark mb-2">수수께끼 힌트</h3>
                <p className="text-[10px] text-layton-lightbrown font-layton-myeongjo font-semibold leading-relaxed mb-4 break-keep">
                  이 수수께끼는 '안티크리에이티브(역발상)' 규칙이 적용됩니다. 스크린 위를 둥둥 떠다니는 가짜 빛 아이콘(🧸, 💵, 📱 등) 20개를 모두 터치해 꺼서 완벽한 어둠을 만드세요!
                </p>
                <button
                  onClick={() => {
                    synth.playClick();
                    setShowHint(false);
                  }}
                  className="w-full py-1.5 bg-[#4a2f13] hover:bg-[#5e3c1b] text-layton-cream text-xs font-bold rounded-xl border border-layton-gold/20 active:scale-95"
                >
                  확인
                </button>
              </div>
            </div>
          )}

          {/* Hint Unlock Confirmation Modal */}
          {showUnlockConfirm && (
            <div className="absolute inset-0 bg-black/60 flex items-center justify-center p-6 z-50 fade-in">
              <div className="w-[280px] bg-layton-parchment rounded-2xl border-4 border-layton-brown p-4 text-center shadow-2xl relative solved-banner">
                <span className="text-2xl block mb-1">🪙</span>
                <h3 className="font-layton-myeongjo font-black text-xs text-layton-dark mb-1">힌트 잠금 해제</h3>
                <p className="text-[9px] text-[#8b5a2b] font-bold mb-3">10 코인이 필요합니다</p>
                <p className="text-[10px] text-layton-lightbrown font-layton-myeongjo leading-normal mb-4">
                  보유 코인: <span className="font-bold text-yellow-600">{coins}개</span><br />
                  10코인을 소모하여 힌트를 보시겠습니까?
                </p>
                <div className="flex gap-2">
                  <button
                    onClick={() => {
                      synth.playClick();
                      setShowUnlockConfirm(false);
                    }}
                    className="flex-1 py-1.5 bg-stone-300 hover:bg-stone-400 text-stone-800 text-[10px] font-bold rounded-xl border border-stone-400 active:scale-95"
                  >
                    취소
                  </button>
                  <button
                    onClick={handleUnlockHint}
                    className="flex-1 py-1.5 bg-gradient-to-b from-[#e7b85e] to-[#ab7418] hover:from-[#f7cb75] hover:to-[#be8420] text-[#2c1a0c] text-[10px] font-bold rounded-xl border border-[#ffe8b5] active:scale-95"
                  >
                    잠금 해제
                  </button>
                </div>
              </div>
            </div>
          )}

        </div>
      );
    }


    // ─────────────────────────────────────────────
    // STAGE 3: 아담의 바구니 (Catching Game)
    // ─────────────────────────────────────────────
    function PuzzleAdamBasket({ coins, onSpendCoins, onBack, onSolved }) {
      // 대폭 완화된 속도 및 조정된 스폰 간격
      const STAGE_CONFIGS = [
        { level: 1, timeLimit: 30, targetScore: 8,  spawnInterval: 1300, fallSpeed: 0.60 },
        { level: 2, timeLimit: 35, targetScore: 12, spawnInterval: 1100, fallSpeed: 0.80 },
        { level: 3, timeLimit: 40, targetScore: 18, spawnInterval: 900,  fallSpeed: 1.00 },
        { level: 4, timeLimit: 45, targetScore: 24, spawnInterval: 700,  fallSpeed: 1.25 },
        { level: 5, timeLimit: 50, targetScore: 30, spawnInterval: 550,  fallSpeed: 1.55 },
      ];

      // 3game.png 스프라이트 좌표 매핑 (x1, y1, x2, y2)
      const GRACE_ITEMS  = [
        { emoji: '❤️',  label: '사랑', type: 'grace', bbox: [110, 466, 282, 625] },    // Item 0 (하트)
        { emoji: '📖',  label: '성경', type: 'grace', bbox: [443, 461, 631, 633] },   // Item 1 (성경책)
        { emoji: '🙏',  label: '기도', type: 'grace', bbox: [754, 447, 942, 653] },   // Item 2 (기도 손)
      ];
      const TEMPT_ITEMS  = [
        { emoji: '🍎',  label: '선악과', type: 'tempt', bbox: [95, 866, 273, 1045] },  // Item 3 (선악과)
        { emoji: '🐍',  label: '뱀',    type: 'tempt', bbox: [778, 861, 962, 1045] },   // Item 5 (뱀)
        { emoji: '🎮',  label: '게임기', type: 'tempt', bbox: [737, 1293, 968, 1433] }, // Item 7 (게임기)
      ];

      const [currentLevel, setCurrentLevel] = useState(1);
      const [score, setScore]               = useState(0);
      const [hearts, setHearts]             = useState(3); // 목숨 최대 3개
      const [timeLeft, setTimeLeft]         = useState(STAGE_CONFIGS[0].timeLimit);
      const [items, setItems]               = useState([]);
      const [adamX, setAdamX]               = useState(50); // percent
      const [phase, setPhase]               = useState('playing'); // playing | levelClear | gameOver | allClear
      const [redFlash, setRedFlash]         = useState(false);
      const [catchText, setCatchText]       = useState('');
      const [finalBonusScore, setFinalBonusScore] = useState(0);

      const gameAreaRef  = useRef(null);
      const animFrameRef = useRef(null);
      const lastSpawnRef = useRef(0);
      const itemsRef     = useRef([]);
      const scoreRef     = useRef(0);
      const heartsRef    = useRef(3); // 목숨 최대 3개
      const phaseRef     = useRef('playing');
      const configRef    = useRef(STAGE_CONFIGS[0]);
      const nextIdRef    = useRef(0);

      // Sync refs
      useEffect(() => { itemsRef.current = items; }, [items]);
      useEffect(() => { scoreRef.current = score; }, [score]);
      useEffect(() => { heartsRef.current = hearts; }, [hearts]);
      useEffect(() => { phaseRef.current = phase; }, [phase]);

      // Touch/mouse Adam movement
      const handlePointerMove = useCallback((clientX) => {
        if (!gameAreaRef.current) return;
        const rect = gameAreaRef.current.getBoundingClientRect();
        const pct  = Math.min(95, Math.max(5, ((clientX - rect.left) / rect.width) * 100));
        setAdamX(pct);
      }, []);

      useEffect(() => {
        const el = gameAreaRef.current;
        if (!el) return;
        const onTouchMove  = (e) => { e.preventDefault(); handlePointerMove(e.touches[0].clientX); };
        const onTouchStart = (e) => { e.preventDefault(); handlePointerMove(e.touches[0].clientX); };
        const onMouseMove  = (e) => { if (e.buttons > 0) handlePointerMove(e.clientX); };
        const onClick      = (e) => handlePointerMove(e.clientX);
        el.addEventListener('touchmove',  onTouchMove,  { passive: false });
        el.addEventListener('touchstart', onTouchStart, { passive: false });
        el.addEventListener('mousemove',  onMouseMove);
        el.addEventListener('click',      onClick);
        return () => {
          el.removeEventListener('touchmove',  onTouchMove);
          el.removeEventListener('touchstart', onTouchStart);
          el.removeEventListener('mousemove',  onMouseMove);
          el.removeEventListener('click',      onClick);
        };
      }, [handlePointerMove]);


      // Game loop
      useEffect(() => {
        if (phase !== 'playing') {
          cancelAnimationFrame(animFrameRef.current);
          return;
        }

        const cfg = configRef.current;

        const loop = (timestamp) => {
          if (phaseRef.current !== 'playing') return;

          // Spawn new item
          if (timestamp - lastSpawnRef.current > cfg.spawnInterval) {
            lastSpawnRef.current = timestamp;
            const pool = Math.random() < 0.55 ? GRACE_ITEMS : TEMPT_ITEMS;
            const template = pool[Math.floor(Math.random() * pool.length)];
            const newItem = {
              id: nextIdRef.current++,
              emoji: template.emoji,
              label: template.label,
              type:  template.type,
              bbox:  template.bbox,
              x: 5 + Math.random() * 90,
              y: -8,
            };
            setItems(prev => [...prev, newItem]);
          }

          // Move items down & check collision
          setItems(prev => {
            const adamXVal = adamX;
            const updated = [];
            for (const item of prev) {
              const newY = item.y + cfg.fallSpeed;

              // Collision zone: y 63-78, x within ±17% of adam (바구니 높이에 맞춰서 Y축 상향 및 가로 확대)
              if (newY >= 63 && newY <= 78) {
                const diff = Math.abs(item.x - adamXVal);
                if (diff < 17) {
                  // Caught!
                  if (item.type === 'grace') {
                    scoreRef.current += 1;
                    setScore(s => s + 1);
                    setCatchText(`+1 ${item.emoji}`);
                    setTimeout(() => setCatchText(''), 700);
                    synth.playN();
                    // Check level clear
                    const cfg2 = STAGE_CONFIGS[currentLevel - 1];
                    if (scoreRef.current >= cfg2.targetScore) {
                      setTimeout(() => {
                        if (phaseRef.current !== 'playing') return;
                        if (currentLevel === 5) {
                          const bonus = Math.max(0, Math.round(scoreRef.current - cfg2.targetScore) * 2);
                          setFinalBonusScore(bonus);
                          setPhase('allClear');
                          phaseRef.current = 'allClear';
                          synth.playVic();
                          confetti({ particleCount: 120, spread: 80, origin: { y: 0.5 } });
                        } else {
                          setPhase('levelClear');
                          phaseRef.current = 'levelClear';
                          synth.playSuccess();
                          confetti({ particleCount: 60, spread: 60, origin: { y: 0.6 } });
                        }
                      }, 200);
                    }
                  } else {
                    // Temptation caught
                    heartsRef.current = Math.max(0, heartsRef.current - 1);
                    setHearts(heartsRef.current);
                    setRedFlash(true);
                    setTimeout(() => setRedFlash(false), 500);
                    setCatchText(`💔 ${item.label}`);
                    setTimeout(() => setCatchText(''), 800);
                    synth.playO();
                    if (heartsRef.current <= 0) {
                      setTimeout(() => {
                        setPhase('gameOver');
                        phaseRef.current = 'gameOver';
                        synth.playOver();
                      }, 300);
                    }
                  }
                  continue; // remove from array
                }
              }

              if (newY > 105) continue; // off screen
              updated.push({ ...item, y: newY });
            }
            return updated;
          });

          animFrameRef.current = requestAnimationFrame(loop);
        };

        animFrameRef.current = requestAnimationFrame(loop);
        return () => cancelAnimationFrame(animFrameRef.current);
      }, [phase, currentLevel, adamX]);

      const startNextLevel = () => {
        const nextLvl = currentLevel + 1;
        configRef.current = STAGE_CONFIGS[nextLvl - 1];
        setCurrentLevel(nextLvl);
        setScore(0); scoreRef.current = 0;
        setHearts(3); heartsRef.current = 3; // 목숨 3개
        setItems([]); itemsRef.current = [];
        lastSpawnRef.current = 0;
        setPhase('playing'); phaseRef.current = 'playing';
        setCatchText('');
        setRedFlash(false);
      };

      const restartGame = () => {
        configRef.current = STAGE_CONFIGS[currentLevel - 1];
        // 현재 레벨(currentLevel)을 그대로 유지하고 해당 레벨에서 다시 시작합니다.
        setScore(0); scoreRef.current = 0;
        setHearts(3); heartsRef.current = 3; // 목숨 3개
        setItems([]); itemsRef.current = [];
        lastSpawnRef.current = 0;
        setPhase('playing'); phaseRef.current = 'playing';
        setCatchText('');
        setRedFlash(false);
        setAdamX(50);
      };

      // Helper function to extract sprite style from 3game.png
      const getItemStyle = (bbox, targetSize = 44) => {
        const [x1, y1, x2, y2] = bbox;
        const w = x2 - x1;
        const h = y2 - y1;
        const scale = targetSize / Math.max(w, h);
        return {
          width: `${w * scale}px`,
          height: `${h * scale}px`,
          backgroundImage: "url('3game.png')",
          backgroundSize: `${1024 * scale}px ${1536 * scale}px`,
          backgroundPosition: `-${x1 * scale}px -${y1 * scale}px`,
          backgroundRepeat: 'no-repeat',
        };
      };

      const cfg = STAGE_CONFIGS[currentLevel - 1];

      return (
        <div
          ref={gameAreaRef}
          className="flex-1 relative overflow-hidden select-none"
          style={{
            backgroundImage: "url('3gamebg.png')",
            backgroundSize: 'cover',
            backgroundPosition: 'center',
            cursor: 'none',
          }}
        >
          {/* Red flash overlay */}
          {redFlash && (
            <div className="absolute inset-0 bg-red-500/30 pointer-events-none z-20 animate-pulse" />
          )}

          {/* HUD (제한시간 표시 제거) */}
          <div className="absolute top-0 inset-x-0 z-10 flex justify-between items-center px-3 py-2 bg-black/40 backdrop-blur-sm">
            <div className="text-white font-black text-xs font-layton-myeongjo">
              Lv.{currentLevel}/5
            </div>
            <div className="text-white font-black text-xs font-layton-myeongjo">
              🎯 {score}/{cfg.targetScore}
            </div>
            <div className="flex gap-0.5 text-sm">
              {Array.from({ length: 3 }).map((_, i) => (
                <span key={i} className={i < hearts ? 'opacity-100' : 'opacity-20'}>❤️</span>
              ))}
            </div>
          </div>

          {/* Falling items (renders as sprite images from 3game.png) */}
          {items.map(item => {
            const itemStyle = getItemStyle(item.bbox, 44);
            return (
              <div
                key={item.id}
                className="absolute pointer-events-none"
                style={{
                  left: `${item.x}%`,
                  top:  `${item.y}%`,
                  transform: 'translate(-50%, -50%)',
                  filter: item.type === 'tempt' ? 'drop-shadow(0 0 6px rgba(220,38,38,0.7))' : 'drop-shadow(0 0 6px rgba(250,204,21,0.8))',
                  ...itemStyle
                }}
              />
            );
          })}

          {/* Catch feedback text */}
          {catchText && (
            <div className="absolute top-1/3 left-1/2 -translate-x-1/2 -translate-y-1/2 text-white font-black text-lg z-20 pointer-events-none scale-in-out">
              {catchText}
            </div>
          )}

          {/* Adam character (adam.png) at bottom - 크기 추가 확대 */}
          <div
            className="absolute z-10 pointer-events-none"
            style={{
              left: `${adamX}%`,
              bottom: '1%',
              transform: 'translateX(-50%)',
              width: '135px',
              height: '202px',
              backgroundImage: "url('adam.png')",
              backgroundSize: 'contain',
              backgroundPosition: 'center',
              backgroundRepeat: 'no-repeat',
              filter: 'drop-shadow(0 4px 10px rgba(0,0,0,0.35))'
            }}
          />

          {/* Level Clear Modal */}
          {phase === 'levelClear' && (
            <div className="absolute inset-0 bg-black/70 z-30 flex items-center justify-center p-4">
              <div className="bg-[#fdfaf2] border-4 border-[#8b5a2b] p-5 rounded-2xl shadow-2xl max-w-[260px] w-full text-center scale-in font-layton-myeongjo">
                <span className="text-4xl block mb-2">🎉</span>
                <h3 className="font-black text-sm text-layton-amber mb-1">Lv.{currentLevel} 클리어!</h3>
                <p className="text-[10px] text-layton-dark leading-relaxed mb-4 break-keep">
                  하나님의 은혜 아이템을 멋지게 받아냈어요!<br />다음 단계는 조금 더 빨라집니다.
                </p>
                <button
                  onClick={startNextLevel}
                  className="w-full py-2 bg-gradient-to-b from-[#e7b85e] to-[#ab7418] text-[#2c1a0c] font-black text-xs rounded-xl border-2 border-[#ffe8b5] shadow active:scale-95"
                >
                  다음 단계 도전 ➡️
                </button>
              </div>
            </div>
          )}

          {/* Game Over Modal */}
          {phase === 'gameOver' && (
            <div className="absolute inset-0 bg-black/80 z-30 flex items-center justify-center p-4">
              <div className="bg-[#fdfaf2] border-4 border-red-800 p-5 rounded-2xl shadow-2xl max-w-[260px] w-full text-center scale-in font-layton-myeongjo">
                <span className="text-4xl block mb-2">🥀</span>
                <h3 className="font-black text-sm text-red-800 mb-1">게임 오버!</h3>
                <p className="text-[10px] text-layton-dark leading-relaxed mb-4 break-keep">
                  하트를 모두 잃었어요!<br />유혹의 아이템을 피하며 다시 도전해 보세요.
                </p>
                <button
                  onClick={restartGame}
                  className="w-full py-2 bg-gradient-to-b from-red-600 to-red-800 text-white font-black text-xs rounded-xl border-2 border-red-400 shadow active:scale-95"
                >
                  다시 도전 🔄
                </button>
              </div>
            </div>
          )}

          {/* All Clear - Scripture Card */}
          {phase === 'allClear' && (
            <div className="absolute inset-0 bg-[#e0f7e9] z-30 flex flex-col items-center justify-center p-5 overflow-auto">
              <div className="absolute bottom-0 inset-x-0 h-32 bg-[#86efac]/80 rounded-t-[120px] pointer-events-none" />
              <div className="absolute bottom-0 inset-x-0 h-20 bg-[#4ade80] rounded-t-[150px] pointer-events-none" />
              <div className="absolute bottom-16 left-4 text-4xl animate-bounce">🌺</div>
              <div className="absolute bottom-16 right-4 text-4xl animate-pulse">🌸</div>
              <div className="absolute top-8 left-6 text-3xl animate-pulse opacity-70">🕊️</div>
              <div className="absolute top-8 right-6 text-3xl animate-bounce opacity-70">🕊️</div>

              {/* Scripture card */}
              <div className="relative z-10 bg-[#fdfaf2] border-4 border-[#8b5a2b] p-5 rounded-2xl shadow-[0_15px_40px_rgba(0,0,0,0.3)] max-w-[290px] w-full text-center font-layton-myeongjo">
                <span className="text-3xl block mb-2">🌿</span>
                <h3 className="font-black text-xs text-layton-amber tracking-wider border-b border-layton-brown/20 pb-2 uppercase">
                  성령의 열매
                </h3>

                <p className="text-[11px] text-[#4a2e13] font-bold leading-relaxed my-4 break-keep">
                  "오직 성령의 열매는 사랑과 희락과 화평과 오래 참음과 자비와 양선과 충성과 온유와 절제니"
                </p>
                <p className="text-[10px] text-[#8b5a2b] font-bold mb-3">(갈라디아서 5:22-23)</p>

                {/* Score banner */}
                <div className="bg-gradient-to-r from-emerald-900/50 to-emerald-800/30 border border-emerald-400/40 rounded-xl p-2.5 mb-4">
                  <div className="text-[10px] text-emerald-300 font-bold">🏆 획득 점수</div>
                  <div className="flex items-baseline justify-center gap-2 mt-0.5">
                    <span className="text-yellow-200 font-black text-sm">+40P</span>
                    {finalBonusScore > 0 && (
                      <span className="text-emerald-300 font-black text-sm">+{finalBonusScore}P 보너스!</span>
                    )}
                  </div>
                  <div className="text-[9px] text-white/40 mt-0.5">초과 점수 × 2 = 보너스</div>
                </div>

                <div className="w-full bg-[#f4edd4] border border-[#d2b48c] p-2.5 rounded-xl text-left text-[9px] text-[#5c4033] leading-relaxed break-keep mb-4">
                  💡 <strong>메시지:</strong> 아담이 에덴에서 하나님과 함께했던 것처럼, 우리도 성령의 열매를 마음에 담아 유혹을 이기고 사랑으로 가득한 삶을 살 수 있어요!
                </div>

                <button
                  onClick={() => onSolved('puzzle-003', finalBonusScore)}
                  className="w-full py-2 bg-gradient-to-b from-[#e7b85e] to-[#ab7418] text-[#2c1a0c] font-black text-xs rounded-xl border-2 border-[#ffe8b5] shadow-md hover:scale-[1.02] active:scale-95 transition-all"
                >
                  다음 스테이지로 ➡️
                </button>
              </div>
            </div>
          )}
        </div>
      );
    }

    // ─────────────────────────────────────────────
    // STAGE 4: 방주의 거짓말쟁이 (PuzzleNoahDeduction)
    // ─────────────────────────────────────────────
    function PuzzleNoahDeduction({ coins, onSpendCoins, onBack, onSolved }) {
      const { useState, useEffect } = React;

      // 스프라이트 자르기 정보 (4stagei.png 원본 크기: 1024x1536)
      const SPRITE_INFO = {
        footprint: { x1: 49, y1: 168, w: 339, h: 209 },
        wood: { x1: 656, y1: 163, w: 278, h: 234 },
        hammer: { x1: 77, y1: 507, w: 272, h: 268 },
        nail: { x1: 671, y1: 565, w: 221, h: 167 },
        sawdust: { x1: 78, y1: 906, w: 291, h: 180 },
        memo: { x1: 658, y1: 840, w: 239, h: 282 },
        blueprint: { x1: 66, y1: 1225, w: 337, h: 246 }
      };

      // 단서 리스트 정의
      const CLUES = [
        { id: 'footprint', name: '동물 발자국', desc: '방주 주변에 찍힌 거대하고 선명한 동물 발자국이다. 동물들이 사방에서 모여들고 있음을 증명한다.' },
        { id: 'wood', name: '나무 조각', desc: '방주를 지을 때 사용한 단단한 고페르 나무 조각이다. 물이 스며들지 않도록 역청이 칠해져 있다.' },
        { id: 'hammer', name: '낡은 망치', desc: '방주 골조를 고정할 때 사용한 노아의 낡은 망치다. 오랜 시간 동안 쉬지 않고 일한 흔적이 묻어 있다.' },
        { id: 'nail', name: '놋못', desc: '나무 널빤지들을 튼튼하게 결합하기 위해 사용된 청동 놋못이다.' },
        { id: 'sawdust', name: '나무 톱밥', desc: '수많은 나무를 베고 다듬으며 쌓인 톱밥 더미다. 방주 건설이 오랜 시간 지속되었음을 말해준다.' },
        { id: 'memo', name: '노아의 메모', desc: '노아가 가죽에 적어둔 메모다. \'하나님의 명령대로 길이 300규빗, 너비 50규빗, 높이 30규빗으로 지으라...\'라고 기록되어 있다.' },
        { id: 'blueprint', name: '설계도 조각', desc: '양가죽에 그려진 거대한 3층 방주의 설계도 일부다. 하늘의 크기와 규격에 완벽히 맞추어져 있다.' }
      ];

      // 7개 단서 배치 좌표 (배경 그림 구조에 매칭)
      const CLUE_POSITIONS = [
        { clueId: 'footprint', x: 15, y: 55 },
        { clueId: 'wood', x: 72, y: 65 },
        { clueId: 'hammer', x: 40, y: 72 },
        { clueId: 'nail', x: 58, y: 48 },
        { clueId: 'sawdust', x: 22, y: 78 },
        { clueId: 'memo', x: 82, y: 42 },
        { clueId: 'blueprint', x: 48, y: 28 }
      ];

      // NPC 진술 리스트
      const NPCS = [
        { id: 'A', name: '마을 사람 A', emoji: '👨', text: '“노아는 아무 이유 없이 저 거대한 배를 산 위에다 만들고 있어. 시간 낭비야!”' },
        { id: 'B', name: '마을 사람 B', emoji: '👩', text: '“동물들이 암수 둘씩 신기하게 짝을 지어서 방주 안으로 모이고 있는걸 봤어.”' },
        { id: 'C', name: '마을 사람 C', emoji: '👴', text: '“하나님은 저 노아라는 노인에게 아무런 말씀도 하지 않으셨고 약속도 한 적 없어!”', isLiar: true },
        { id: 'D', name: '마을 사람 D', emoji: '👦', text: '“노아 할아버지는 정말 오랫동안 정성을 다해 방주를 단단히 만들고 있어.”' }
      ];

      const [searchedClues, setSearchedClues] = useState({});
      const [activeClue, setActiveClue] = useState(null);
      const [showNotes, setShowNotes] = useState(false);
      const [phase, setPhase] = useState('explore'); // 'explore' | 'deduce' | 'cutscene' | 'clear'
      const [selectedNPC, setSelectedNPC] = useState(null);
      const [showLiarAlert, setShowLiarAlert] = useState(false);
      const [cutsceneFrame, setCutsceneFrame] = useState(0);

      const searchedCount = Object.keys(searchedClues).filter(k => searchedClues[k]).length;
      const canDeduce = searchedCount >= 5;

      // 스프라이트 렌더링용 스타일 생성 함수
      const getSpriteStyle = (clueId, targetWidth = 60) => {
        const sprite = SPRITE_INFO[clueId];
        if (!sprite) return {};
        const { x1, y1, w, h } = sprite;
        const scale = targetWidth / w;
        const finalHeight = h * scale;
        const bgWidth = 1024 * scale;
        const bgHeight = 1536 * scale;
        const posX = -x1 * scale;
        const posY = -y1 * scale;

        return {
          backgroundImage: "url('4stagei.png')",
          backgroundPosition: `${posX}px ${posY}px`,
          backgroundSize: `${bgWidth}px ${bgHeight}px`,
          width: `${targetWidth}px`,
          height: `${finalHeight}px`,
          backgroundRepeat: 'no-repeat'
        };
      };

      const handleClueClick = (clue) => {
        setSearchedClues(prev => ({ ...prev, [clue.id]: true }));
        setActiveClue(clue);
        synth.playClick();
      };

      const handleNPCClick = (npc) => {
        setSelectedNPC(npc);
        if (npc.isLiar) {
          synth.playSuccess();
          setPhase('cutscene');
        } else {
          synth.playO();
          setShowLiarAlert(true);
        }
      };

      // 컷신 애니메이션 이펙트
      useEffect(() => {
        if (phase !== 'cutscene') return;
        const interval = setInterval(() => {
          setCutsceneFrame(f => (f + 1) % 4);
        }, 800);
        return () => clearInterval(interval);
      }, [phase]);

      return (
        <div className="relative w-full max-w-md mx-auto h-[600px] bg-gradient-to-b from-[#6b4724] to-[#3a220f] overflow-hidden rounded-3xl shadow-2xl flex flex-col font-layton-myeongjo text-[#5c4033] border-4 border-[#503319] select-none">
          
          {/* Header */}
          <div className="flex items-center justify-between px-4 py-3 bg-[#523317] border-b-2 border-[#3d230d] text-white z-10">
            <button onClick={onBack} className="p-1 text-sm bg-[#784d28] hover:bg-[#8e5c32] active:scale-95 rounded-lg border border-[#9a6a3b] transition-all">
              ⬅️ 지도
            </button>
            <div className="text-center">
              <span className="text-[9px] text-[#cca274] font-black uppercase tracking-wider">STAGE 4</span>
              <h2 className="text-xs font-black text-[#ffd19a]">방주의 거짓말쟁이</h2>
            </div>
            <div className="px-2 py-0.5 bg-[#ab7a4e] text-[9px] rounded-full font-bold border border-[#ffd5af]">
              {phase === 'explore' ? '조사 모드 🔎' : phase === 'deduce' ? '추리 모드 💬' : '스토리 🎬'}
            </div>
          </div>

          {/* 1. EXPLORE PHASE */}
          {phase === 'explore' && (
            <div 
              className="relative flex-1 w-full overflow-hidden flex flex-col justify-between" 
              style={{ 
                backgroundImage: "url('4stageb.png')", 
                backgroundSize: 'cover', 
                backgroundPosition: 'center',
                backgroundRepeat: 'no-repeat'
              }}
            >
              
              {/* Construction area overlay visual shadow for depth */}
              <div className="absolute inset-0 bg-black/10 pointer-events-none"></div>

              {/* Clue Hotspots (Rendered via sprite clipping) */}
              {CLUE_POSITIONS.map(pos => {
                const clue = CLUES.find(c => c.id === pos.clueId);
                const isSearched = searchedClues[clue.id];
                return (
                  <button
                    key={clue.id}
                    onClick={() => handleClueClick(clue)}
                    className="absolute group flex flex-col items-center justify-center p-1 rounded-xl transition-all duration-300 hover:scale-115 active:scale-95 hover:brightness-110 filter drop-shadow-[0_4px_8px_rgba(0,0,0,0.5)]"
                    style={{ left: `${pos.x}%`, top: `${pos.y}%` }}
                  >
                    <div className="relative">
                      {/* Sprited item crop */}
                      <div style={getSpriteStyle(clue.id, 45)} className="rounded-lg" />
                      
                      {isSearched ? (
                        <div className="absolute -top-2 -right-2 bg-green-600 text-white rounded-full w-4.5 h-4.5 flex items-center justify-center text-[9px] font-black border-2 border-white shadow-md">
                          ✔
                        </div>
                      ) : (
                        <div className="absolute -top-2.5 -right-2.5 bg-yellow-400 text-[#4e2d0c] rounded-full w-4 h-4 flex items-center justify-center text-[8px] font-bold border border-[#ffe8b5] animate-ping">
                          ❓
                        </div>
                      )}
                    </div>
                  </button>
                );
              })}

              {/* Lower HUD buttons */}
              <div className="absolute inset-x-0 bottom-4 px-4 flex justify-between items-center z-10">
                <button
                  onClick={() => setShowNotes(true)}
                  className="flex items-center gap-1 px-3 py-1.5 bg-[#4a2e16] hover:bg-[#5a391d] active:scale-95 text-[#e4c09d] text-[10px] font-bold rounded-xl border border-[#714624] shadow-lg transition-all"
                >
                  📓 단서 노트
                </button>
                <div className="bg-[#412811]/85 border border-[#6b4728] px-3 py-1 rounded-full text-[9px] text-[#ffd19a] font-bold shadow-md">
                  조사 완료: {searchedCount} / 7
                </div>
                <button
                  onClick={() => setPhase('deduce')}
                  disabled={!canDeduce}
                  className={`px-4 py-2 text-xs font-black rounded-xl border-2 shadow-lg transition-all ${canDeduce ? 'bg-gradient-to-b from-[#f59e0b] to-[#b45309] text-white border-[#fef3c7] hover:scale-105 active:scale-95' : 'bg-gray-400 text-gray-200 border-gray-300 opacity-50 cursor-not-allowed'}`}
                >
                  🔍 추리 시작
                </button>
              </div>

              {/* Active Clue Detail Modal (Layton Style Pop) */}
              {activeClue && (
                <div className="absolute inset-0 bg-black/55 z-30 flex items-center justify-center p-4">
                  <div className="bg-[#fffdf9] border-4 border-[#855422] p-5 rounded-2xl shadow-2xl text-center max-w-[270px] w-full pop-in font-layton-myeongjo">
                    <div className="flex justify-center mb-2 filter drop-shadow-md">
                      {/* Scaled sprite for popup */}
                      <div style={getSpriteStyle(activeClue.id, 90)} className="mx-auto rounded-lg" />
                    </div>
                    <h3 className="font-black text-sm text-[#5a3615] mt-2 border-b border-[#cca379] pb-1 inline-block px-4">
                      {activeClue.name}
                    </h3>
                    <p className="text-[10px] text-gray-600 mt-3 leading-relaxed text-justify break-keep">
                      {activeClue.desc}
                    </p>
                    <button
                      onClick={() => setActiveClue(null)}
                      className="w-full mt-4 py-2 bg-[#855422] text-white font-black text-[10px] rounded-lg hover:bg-[#6c4219] transition-all active:scale-95 shadow"
                    >
                      닫기 ✖
                    </button>
                  </div>
                </div>
              )}
            </div>
          )}

          {/* 2. DEDUCE PHASE (NPC 진술 판독) */}
          {phase === 'deduce' && (
            <div className="flex-1 w-full bg-[#fdfaf2] p-4 flex flex-col justify-between overflow-y-auto">
              
              <div className="text-center border-b border-[#825324]/30 pb-2 mb-3">
                <span className="text-[9px] text-[#8c653f] font-bold tracking-widest uppercase">TESTIMONIAL ANALYSIS</span>
                <h3 className="font-black text-sm text-[#4a2e16] mt-0.5">거짓말을 하는 사람을 찾으세요!</h3>
                <p className="text-[9px] text-gray-500">지금까지 수집한 성경 단서들을 토대로 잘못 말하는 1인을 터치하세요.</p>
              </div>

              {/* NPC speech bubbles list */}
              <div className="flex-1 flex flex-col gap-3 justify-center">
                {NPCS.map(npc => (
                  <button
                    key={npc.id}
                    onClick={() => handleNPCClick(npc)}
                    className="flex items-start gap-3 bg-white border-2 border-[#cca379] hover:border-[#825324] hover:bg-[#fefcf8] rounded-2xl p-3 shadow-sm transition-all active:scale-[0.98]"
                  >
                    <div className="flex flex-col items-center shrink-0">
                      <span className="text-3.5xl filter drop-shadow-[0_1px_3px_rgba(0,0,0,0.15)]">{npc.emoji}</span>
                      <span className="text-[8px] bg-[#825324] text-white px-1.5 py-0.5 rounded-full font-bold mt-1">
                        {npc.name}
                      </span>
                    </div>
                    <div className="flex-1 text-left">
                      <p className="text-[10px] text-[#3a2007] leading-relaxed break-keep font-medium">
                        {npc.text}
                      </p>
                    </div>
                  </button>
                ))}
              </div>

              {/* Lower notes & return button */}
              <div className="mt-4 flex gap-2">
                <button
                  onClick={() => setShowNotes(true)}
                  className="flex-1 py-2 bg-[#4a2e16] hover:bg-[#5a391d] text-[#e4c09d] text-[10px] font-bold rounded-xl border border-[#714624] transition-all shadow"
                >
                  📓 단서 노트 확인
                </button>
                <button
                  onClick={() => setPhase('explore')}
                  className="flex-1 py-2 bg-[#f3f4f6] hover:bg-gray-100 text-gray-700 text-[10px] font-bold rounded-xl border border-gray-300 transition-all shadow"
                >
                  🔎 단서 더 찾으러 가기
                </button>
              </div>

              {/* Incorrect guess alert modal */}
              {showLiarAlert && (
                <div className="absolute inset-0 z-30 bg-black/55 flex items-center justify-center p-4">
                  <div className="bg-[#fff5f5] border-4 border-[#dc2626] p-5 rounded-2xl shadow-2xl text-center max-w-[250px] w-full pop-in">
                    <span className="text-4.5xl">💡🧐</span>
                    <h4 className="font-black text-sm text-[#dc2626] mt-2">단서를 다시 조사해보자.</h4>
                    <p className="text-[10px] text-gray-600 mt-1 leading-relaxed">
                      지목한 사람의 진술은 수집된 단서들과 배치되지 않는 사실인 것 같아요.
                    </p>
                    <button
                      onClick={() => {
                        setShowLiarAlert(false);
                        setPhase('explore'); // 오답 시 맵으로 복귀
                      }}
                      className="w-full mt-4 py-2 bg-gradient-to-b from-[#ef4444] to-[#b91c1c] text-white font-black text-xs rounded-xl shadow-md transition-all active:scale-95"
                    >
                      단서 찾기로 돌아가기 ➡️
                    </button>
                  </div>
                </div>
              )}

            </div>
          )}

          {/* 3. CUTSCENE PHASE (노아가 말씀을 들음) */}
          {phase === 'cutscene' && (
            <div className="flex-1 w-full bg-[#1e293b] overflow-hidden flex flex-col justify-between p-4 relative">
              
              {/* Starry Night Sky and Mountain background (CSS-driven animation) */}
              <div className="absolute inset-0 bg-[#0f172a]" style={{ backgroundImage: "radial-gradient(circle at 50% 30%, #1e293b 0%, #090d16 100%)" }}></div>

              {/* Stars twinkling */}
              <div className="absolute inset-0 opacity-40">
                <div className="absolute top-8 left-12 w-1 h-1 bg-white rounded-full animate-ping"></div>
                <div className="absolute top-20 right-16 w-1.5 h-1.5 bg-yellow-200 rounded-full animate-pulse"></div>
                <div className="absolute top-36 left-28 w-1 h-1 bg-white rounded-full animate-pulse delay-500"></div>
              </div>

              {/* Detective Success Banner */}
              <div className="relative z-10 text-center mt-2 animate-bounce">
                <span className="bg-yellow-400 text-yellow-950 font-black text-sm px-6 py-1.5 rounded-full border-4 border-white shadow-lg tracking-widest inline-block">
                  🕵️‍♂️ 탐정 성공!
                </span>
              </div>

              {/* Animated Scene Area */}
              <div className="relative flex-1 w-full flex items-center justify-center z-10">
                {/* Noah Figure */}
                <div className="absolute bottom-8 left-1/2 -translate-x-1/2 flex flex-col items-center">
                  {/* Kneeling Noah Emoji */}
                  <span className="text-7xl filter drop-shadow-[0_4px_10px_rgba(253,224,71,0.5)] transform scale-x-[-1] animate-pulse">
                    🧎‍♂️
                  </span>
                  <span className="text-[9px] bg-slate-900/80 text-yellow-300 font-bold px-2 py-0.5 rounded-full border border-yellow-500/20 mt-1">
                    경청하는 노아
                  </span>
                </div>

                {/* Scaffolding ark under construction draft in darkness */}
                <div className="absolute bottom-0 left-6 right-6 h-12 bg-amber-950/40 rounded-t-xl border-t border-amber-900/40 pointer-events-none flex items-center justify-center">
                  <span className="text-xl opacity-40">🚢🚧</span>
                </div>

                {/* God's voice ray beam effect */}
                <div className="absolute top-0 left-1/2 -translate-x-1/2 w-32 h-[320px] bg-gradient-to-b from-yellow-300/45 via-yellow-200/20 to-transparent clip-path-beam animate-pulse"></div>
              </div>

              {/* Captions sub */}
              <div className="relative z-10 bg-slate-950/80 border border-yellow-500/30 p-3 rounded-2xl text-center">
                <p className="text-yellow-300 text-[10.5px] leading-relaxed break-keep font-medium">
                  {cutsceneFrame === 0 && "“노아야, 너는 고페르 나무로 너를 위하여 방주를 만들고...”"}
                  {cutsceneFrame === 1 && "“내가 홍수를 땅에 일으켜 무릇 생명의 기운이 있는 모든 육체를 천하에서 멸절하리니...”"}
                  {cutsceneFrame === 2 && "“그러나 너와는 내가 내 언약을 세우리니 너는 네 아들들과 네 아내와 네 며느리들과 함께 그 방주로 들어가라.”"}
                  {cutsceneFrame === 3 && "노아는 여호와께서 자기에게 명하신 대로 다 준행하였습니다."}
                </p>
                <div className="flex gap-1 justify-center mt-2">
                  <span className={`w-1.5 h-1.5 rounded-full ${cutsceneFrame === 0 ? 'bg-yellow-400' : 'bg-gray-600'}`}></span>
                  <span className={`w-1.5 h-1.5 rounded-full ${cutsceneFrame === 1 ? 'bg-yellow-400' : 'bg-gray-600'}`}></span>
                  <span className={`w-1.5 h-1.5 rounded-full ${cutsceneFrame === 2 ? 'bg-yellow-400' : 'bg-gray-600'}`}></span>
                  <span className={`w-1.5 h-1.5 rounded-full ${cutsceneFrame === 3 ? 'bg-yellow-400' : 'bg-gray-600'}`}></span>
                </div>
              </div>

              <div className="relative z-10 mt-3">
                <button
                  onClick={() => setPhase('clear')}
                  className="w-full py-2 bg-gradient-to-r from-yellow-400 to-amber-500 hover:scale-102 active:scale-95 text-yellow-950 font-black text-xs rounded-xl shadow-lg border-2 border-white transition-all"
                >
                  🌈 말씀 약속 카드 받기 ➡️
                </button>
              </div>

            </div>
          )}

          {/* 4. FINAL SCRIPTURE CARD OVERLAY (CLEAR PHASE) */}
          {phase === 'clear' && (
            <div className="absolute inset-0 z-40 bg-black/75 flex items-center justify-center p-4">
              <div className="bg-[#fffbf0] border-4 border-[#855422] p-5 rounded-2xl shadow-2xl text-center max-w-[320px] w-full pop-in relative overflow-hidden flex flex-col items-center">
                
                {/* Rainbow background pattern */}
                <div className="absolute top-0 left-0 right-0 h-4 bg-gradient-to-r from-red-500 via-yellow-400 via-green-500 via-blue-500 to-purple-600"></div>

                <div className="mt-3 flex flex-col items-center gap-1">
                  <span className="text-4xl animate-bounce">🌈🚢</span>
                  <span className="text-[10px] text-emerald-700 font-bold tracking-widest uppercase">STAGE 4 CLEAR</span>
                  <h3 className="font-black text-sm text-[#4e2d0c]">방주의 짝과 하나님의 언약</h3>
                </div>

                <div className="my-4 bg-[#f6efe2] border border-[#dfd4be] p-3 rounded-xl max-h-[160px] overflow-y-auto">
                  <p className="font-layton-myeongjo text-[11px] font-medium text-[#52371b] leading-relaxed text-justify break-keep">
                    "정결한 짐승과 부정한 짐승과 새와 땅에 기는 모든 것은 하나님이 노아에게 명하신 대로 암수 둘씩 노아에게 나아와 방주로 들어갔으니"
                  </p>
                  <p className="text-right text-[9px] text-emerald-800 font-bold mt-1.5">
                    — 창세기 7:8-9
                  </p>
                </div>

                <div className="w-full bg-[#e8f6ed] border border-[#a7d7b9] p-2 rounded-lg text-left text-[8.5px] text-[#1e5831] leading-relaxed mb-4 break-keep">
                  💡 <strong>하나님의 은혜:</strong> 마을 사람 C는 하나님이 아무 말씀도 하지 않으셨다고 비난했지만, 노아는 하나님의 신실한 약속과 말씀을 듣고 방주를 지었습니다. 그 결과로 모든 생명이 안전하게 보존되었습니다.
                </div>

                <button
                  onClick={() => onSolved('puzzle-004', 0)}
                  className="w-full py-2.5 bg-gradient-to-b from-[#e7b85e] to-[#ab7418] text-[#2c1a0c] font-black text-xs rounded-xl border-2 border-[#ffe8b5] shadow-md hover:scale-[1.02] active:scale-95 transition-all"
                >
                  다음 스테이지로 ➡️
                </button>
              </div>
            </div>
          )}

          {/* 5. NOTES OVERLAY (단서 노트 📓) */}
          {showNotes && (
            <div className="absolute inset-0 z-40 bg-black/60 flex items-center justify-end">
              <div className="bg-[#f5ebd7] border-l-4 border-[#855422] w-[260px] h-full shadow-2xl p-4 flex flex-col justify-between slide-in font-layton-myeongjo">
                
                <div>
                  <div className="flex items-center justify-between border-b border-[#855422]/30 pb-2 mb-3">
                    <span className="text-xs font-black text-[#5a3615]">📓 단서 노트 (수집품)</span>
                    <button onClick={() => setShowNotes(false)} className="text-[#855422] hover:text-[#5a3615] font-black text-sm">
                      ✖
                    </button>
                  </div>

                  <div className="flex flex-col gap-2 max-h-[440px] overflow-y-auto pr-1">
                    {CLUES.map(clue => {
                      const isSearched = searchedClues[clue.id];
                      return (
                        <div
                          key={clue.id}
                          className={`flex items-start gap-2.5 p-2 rounded-xl border transition-all ${isSearched ? 'bg-white border-[#cca379]' : 'bg-[#e9dec6] border-[#dfd2b5] opacity-50'}`}
                        >
                          <div className="shrink-0">
                            {isSearched ? (
                              <div style={getSpriteStyle(clue.id, 40)} className="rounded-md border border-[#cca379]" />
                            ) : (
                              <div className="w-10 h-10 bg-gray-300/40 rounded-md border border-dashed border-gray-400 flex items-center justify-center text-lg">
                                ❓
                              </div>
                            )}
                          </div>
                          <div className="text-left flex-1">
                            <h4 className="text-[9.5px] font-black text-[#5a3615]">
                              {clue.name} {isSearched && '✔'}
                            </h4>
                            <p className="text-[8.5px] text-gray-500 leading-relaxed mt-0.5 break-keep">
                              {isSearched ? clue.desc : '아직 조사하지 않은 단서입니다.'}
                            </p>
                          </div>
                        </div>
                      );
                    })}
                  </div>
                </div>

                <button
                  onClick={() => setShowNotes(false)}
                  className="w-full py-2 bg-[#855422] text-white font-black text-xs rounded-xl shadow transition-all active:scale-95 mt-4"
                >
                  수첩 닫기 📓
                </button>

              </div>
            </div>
          )}

        </div>
      );
    }


    // ─────────────────────────────────────────────


    function PuzzleEdenAnimals({ coins, onSpendCoins, onBack, onSolved }) {
      const [currentLevel, setCurrentLevel] = useState(1);
      const [cards, setCards] = useState([]);
      const [selectedCards, setSelectedCards] = useState([]);
      const [matchedText, setMatchedText] = useState('');
      const [showLevelClearedPopup, setShowLevelClearedPopup] = useState(false);
      const [showFinalScriptureCard, setShowFinalScriptureCard] = useState(false);
      const [clicksLeft, setClicksLeft] = useState(100);
      const [isGameOver, setIsGameOver] = useState(false);
      const [isPreviewing, setIsPreviewing] = useState(true);
      const [finalBonusScore, setFinalBonusScore] = useState(0);

      const previewTimeoutRef = useRef(null);

      const levelConfigs = [
        { level: 1, rows: 2, cols: 2, numPairs: 2 },
        { level: 2, rows: 2, cols: 3, numPairs: 3 },
        { level: 3, rows: 2, cols: 4, numPairs: 4 },
        { level: 4, rows: 3, cols: 4, numPairs: 6 },
        { level: 5, rows: 4, cols: 4, numPairs: 8 },
      ];

      const animalPool = [
        { emoji: '🦁', name: '사자', bgColor: 'bg-[#fef3c7]' },
        { emoji: '🐘', name: '코끼리', bgColor: 'bg-[#e0f2fe]' },
        { emoji: '🦒', name: '기린', bgColor: 'bg-[#fef9c3]' },
        { emoji: '🐑', name: '양', bgColor: 'bg-[#f3f4f6]' },
        { emoji: '🦌', name: '사슴', bgColor: 'bg-[#ffedd5]' },
        { emoji: '🐇', name: '토끼', bgColor: 'bg-[#fce7f3]' },
        { emoji: '🐻', name: '곰', bgColor: 'bg-[#efebeb]' },
        { emoji: '🦊', name: '여우', bgColor: 'bg-[#fee2e2]' },
      ];

      const initLevel = (levelNum) => {
        const config = levelConfigs[levelNum - 1];
        const levelAnimals = animalPool.slice(0, config.numPairs);
        let deck = [];
        levelAnimals.forEach(animal => {
          // Initialize with isFlipped: true so cards are shown face up during preview!
          deck.push({ ...animal, id: `${animal.name}-1`, isFlipped: true, isMatched: false });
          deck.push({ ...animal, id: `${animal.name}-2`, isFlipped: true, isMatched: false });
        });
        // Shuffle
        deck.sort(() => Math.random() - 0.5);
        setCards(deck);
        setSelectedCards([]);
        setMatchedText('');
        setShowLevelClearedPopup(false);

        // Preview mode active
        setIsPreviewing(true);
        if (previewTimeoutRef.current) clearTimeout(previewTimeoutRef.current);
        previewTimeoutRef.current = setTimeout(() => {
          setCards(prev => prev.map(c => ({ ...c, isFlipped: false })));
          setIsPreviewing(false);
        }, 1800);
      };

      useEffect(() => {
        initLevel(currentLevel);
        return () => {
          if (previewTimeoutRef.current) clearTimeout(previewTimeoutRef.current);
        };
      }, [currentLevel]);

      const handleCardClick = (idx) => {
        if (selectedCards.length >= 2 || isPreviewing || clicksLeft <= 0 || isGameOver) return;
        const clickedCard = cards[idx];
        if (clickedCard.isFlipped || clickedCard.isMatched) return;

        synth.playClick();

        // Decrement clicks
        const nextClicksLeft = clicksLeft - 1;
        setClicksLeft(nextClicksLeft);

        const newCards = [...cards];
        newCards[idx].isFlipped = true;
        setCards(newCards);

        const newSelected = [...selectedCards, idx];
        setSelectedCards(newSelected);

        if (newSelected.length === 2) {
          const firstIdx = newSelected[0];
          const secondIdx = newSelected[1];
          const firstCard = cards[firstIdx];
          const secondCard = cards[secondIdx];

          if (firstCard.emoji === secondCard.emoji) {
            // Match!
            setTimeout(() => {
              synth.playSuccess();
              setMatchedText(`${firstCard.name}을(를) 찾았어요!`);

              const matchedCards = newCards.map((c, i) => {
                if (i === firstIdx || i === secondIdx) {
                  return { ...c, isMatched: true };
                }
                return c;
              });
              setCards(matchedCards);
              setSelectedCards([]);

              setTimeout(() => {
                setMatchedText('');
              }, 1200);

              const allMatched = matchedCards.every(c => c.isMatched);
              if (allMatched) {
                setTimeout(() => {
                  if (currentLevel === 5) {
                    // Calculate touch-saving bonus: max 65 bonus points
                    const clicksUsed = 100 - nextClicksLeft;
                    const bonus = Math.max(0, Math.round((100 - clicksUsed) * 0.65));
                    setFinalBonusScore(bonus);
                    setShowFinalScriptureCard(true);
                    synth.playVic();
                  } else {
                    setShowLevelClearedPopup(true);
                    synth.playSuccess();
                    confetti({
                      particleCount: 50,
                      spread: 60,
                      origin: { y: 0.7 }
                    });
                  }
                }, 600);
              } else {
                // Not all matched, check if clicks are exhausted
                if (nextClicksLeft <= 0) {
                  setTimeout(() => {
                    setIsGameOver(true);
                    synth.playBuzz();
                  }, 800);
                }
              }
            }, 400);
          } else {
            // Fail!
            setTimeout(() => {
              synth.playBuzz();
              const revertedCards = [...newCards];
              revertedCards[firstIdx].isFlipped = false;
              revertedCards[secondIdx].isFlipped = false;
              setCards(revertedCards);
              setSelectedCards([]);

              // Check if clicks are exhausted after failing to match
              if (nextClicksLeft <= 0) {
                setIsGameOver(true);
                synth.playBuzz();
              }
            }, 1000);
          }
        }
      };

      const handleHintClick = () => {
        if (coins < 5 || isPreviewing || isGameOver) return;
        synth.playConsume();
        onSpendCoins(5);

        const faceUpState = cards.map(c => ({ ...c, isFlipped: true }));
        setCards(faceUpState);

        setTimeout(() => {
          setCards(prev => prev.map(c => {
            if (c.isMatched) return c;
            return { ...c, isFlipped: false };
          }));
        }, 1200);
      };

      const handleNextLevel = () => {
        synth.playClick();
        setCurrentLevel(prev => prev + 1);
      };

      const levelConfig = levelConfigs[currentLevel - 1];
      const gridColsClass = levelConfig.cols === 2 ? 'grid-cols-2' : levelConfig.cols === 3 ? 'grid-cols-3' : 'grid-cols-4';

      return (
        <div className="flex-1 flex flex-col bg-[#160f0a] relative select-none overflow-hidden">
          {/* Card Game Canvas Area */}
          <div className="flex-1 p-4 flex flex-col justify-between items-center relative z-10">
            {/* Top Level indicator bar */}
            <div className="w-full flex justify-between items-center bg-[#2d1e11]/60 px-3 py-1.5 rounded-xl border border-layton-gold/20 mb-3 text-layton-amber text-xs font-layton-myeongjo">
              <span className="flex items-center gap-1">🦁 Level {currentLevel}/5</span>
              <span className={`font-extrabold px-2.5 py-0.5 rounded-full ${clicksLeft <= 15 ? 'bg-red-600/30 text-red-300 animate-pulse' : 'bg-amber-500/20 text-yellow-300'}`}>
                🎯 남은 터치: {clicksLeft}회
              </span>
            </div>

            {/* Grid Container */}
            <div className="flex-1 w-full flex items-center justify-center">
              <div className={`grid ${gridColsClass} gap-3 max-w-[280px] w-full aspect-square`}>
                {cards.map((card, idx) => {
                  if (card.isMatched) {
                    return <div key={card.id} className="opacity-0 pointer-events-none w-full h-full" />;
                  }

                  return (
                    <div
                      key={card.id}
                      onClick={() => handleCardClick(idx)}
                      className="w-full h-full cursor-pointer relative"
                    >
                      {card.isFlipped ? (
                        <div className={`w-full h-full ${card.bgColor} border-4 border-[#8b5a2b] rounded-2xl flex flex-col items-center justify-center relative shadow-md p-1 scale-in`}>
                          <span className="text-3xl filter drop-shadow-sm">{card.emoji}</span>
                          <span className="text-[10px] font-black text-[#5c4033] font-layton-myeongjo mt-1">{card.name}</span>
                        </div>
                      ) : (
                        <div className="w-full h-full bg-[#f4ebd0] border-4 border-[#8b5a2b] rounded-2xl flex items-center justify-center relative overflow-hidden shadow-md active:scale-95 transition-transform">
                          <div className="absolute inset-1.5 border border-[#8b5a2b]/30 rounded-xl flex items-center justify-center">
                            <span className="text-2xl opacity-40 select-none">🌿</span>
                          </div>
                        </div>
                      )}
                    </div>
                  );
                })}
              </div>
            </div>

            {/* Floating Pair Match Notification Banner */}
            {matchedText && (
              <div className="absolute top-1/2 left-1/2 transform -translate-x-1/2 -translate-y-1/2 bg-[#36200c]/95 border-2 border-layton-gold text-[#fff5db] font-layton-myeongjo font-bold px-4 py-2.5 rounded-xl z-20 shadow-2xl scale-in-out whitespace-nowrap">
                ✨ {matchedText}
              </div>
            )}

            {/* Memory Preview Banner Overlay */}
            {isPreviewing && (
              <div className="absolute top-1/2 left-1/2 transform -translate-x-1/2 -translate-y-1/2 bg-[#36200c]/90 border-2 border-layton-gold text-[#fff5db] font-layton-myeongjo font-bold px-4 py-2.5 rounded-xl z-20 shadow-2xl scale-in-out animate-pulse select-none pointer-events-none">
                👀 카드를 기억하세요!
              </div>
            )}

            {/* Bottom Help/Hint HUD Bar */}
            <div className="w-full mt-3 flex justify-between items-center">
              <button
                onClick={handleHintClick}
                disabled={coins < 5 || isPreviewing}
                className={`bg-black/60 border border-stone-800 text-[#e7b85e] hover:text-yellow-300 text-[10px] font-layton-myeongjo font-bold px-3 py-1.5 rounded-full flex items-center gap-0.5 ${
                  (coins < 5 || isPreviewing) ? 'opacity-40 cursor-not-allowed' : 'active:scale-95'
                }`}
              >
                💡 힌트 (5🪙)
              </button>
              <span className="text-[9px] text-stone-400 font-layton-myeongjo">
                * 뒤집어서 같은 동물 한 쌍을 찾으세요
              </span>
            </div>
          </div>

          {/* Level Cleared Popup Modal */}
          {showLevelClearedPopup && (
            <div className="absolute inset-0 bg-black/75 z-40 flex items-center justify-center p-4">
              <div className="bg-[#fdfaf2] border-4 border-[#8b5a2b] p-5 rounded-2xl shadow-2xl max-w-[260px] w-full text-center scale-in font-layton-myeongjo">
                <span className="text-4xl block mb-2 filter drop-shadow">🎉</span>
                <h3 className="font-black text-sm text-layton-amber mb-1.5">Level {currentLevel} 성공!</h3>
                <p className="text-[10px] text-layton-dark leading-relaxed mb-4">

              <div className="absolute top-12 left-1/2 -translate-x-1/2 w-48 h-48 bg-gradient-to-tr from-[#fef08a]/20 to-[#fef08a]/40 rounded-full blur-2xl pointer-events-none" />

              {/* Rolling hills of Eden landscape background */}
              <div className="absolute bottom-0 inset-x-0 h-48 bg-[#bbf7d0]/85 rounded-t-[100px] pointer-events-none" />
              <div className="absolute bottom-0 inset-x-0 h-36 bg-[#86efac]/90 rounded-t-[120px] pointer-events-none" />
              <div className="absolute bottom-0 inset-x-0 h-24 bg-[#4ade80] rounded-t-[150px] pointer-events-none" />

              {/* Eden creatures representation */}
              <div className="absolute bottom-16 left-8 text-3xl animate-bounce">🦁</div>
              <div className="absolute bottom-8 right-10 text-4xl">🐘</div>
              <div className="absolute bottom-20 right-28 text-3xl animate-pulse">🦒</div>
              <div className="absolute bottom-6 left-28 text-2xl">🐑</div>
              <div className="absolute bottom-24 left-1/2 -translate-x-1/2 text-4xl animate-pulse">🌳</div>

              {/* Framing borders */}
              <div className="absolute inset-4 border-2 border-layton-gold/25 rounded-xl pointer-events-none"></div>

              {/* Centered holy Scripture card */}
              <div className="my-auto mx-auto max-w-[280px] w-full bg-[#fdfaf2] border-4 border-[#8b5a2b] p-5 rounded-2xl shadow-[0_15px_30px_rgba(0,0,0,0.35)] z-10 flex flex-col items-center text-center scale-in font-layton-myeongjo">
                <span className="text-3xl block mb-2 filter drop-shadow">📖</span>
                <h3 className="font-black text-xs text-layton-amber tracking-wider border-b border-layton-brown/20 pb-1.5 w-full uppercase">
                  에덴동산의 평화
                </h3>
                
                <p className="text-[11px] text-[#4a2e13] font-bold leading-relaxed my-4 break-keep">
                  "아담이 모든 가축과 공중의 새와 들의 모든 짐승에게 이름을 주니라 (창세기 2:20)"
                </p>

                {/* Bonus Score Banner */}
                <div className="w-full bg-gradient-to-r from-emerald-900/60 to-emerald-800/40 border border-emerald-500/40 rounded-xl p-2.5 mb-3 flex flex-col items-center">
                  <div className="text-[10px] text-emerald-300 font-bold font-layton-myeongjo">
                    🏆 획득 점수
                  </div>
                  <div className="flex items-baseline gap-2 mt-0.5">
                    <span className="text-yellow-200 font-black text-sm font-layton-myeongjo">+35P</span>
                    {finalBonusScore > 0 && (
                      <span className="text-emerald-300 font-black text-sm font-layton-myeongjo">+{finalBonusScore}P 보너스!</span>
                    )}
                  </div>
                  <div className="text-[9px] text-layton-cream/50 font-layton-myeongjo mt-0.5">
                    남은 터치 {clicksLeft}회 × 0.65 = 절약 보너스
                  </div>
                </div>

                  💡 <strong>메시지:</strong> 아담이 동물의 이름을 지어주며 하나님이 만드신 세상을 사랑과 배려로 돌보았듯, 짝을 맞추며 생명을 존중하는 예쁜 마음을 키웠어요!
                </div>

                <button
                  onClick={() => {
                    onSolved('puzzle-002', finalBonusScore);
                  }}
                  className="w-full py-2 bg-gradient-to-b from-[#e7b85e] to-[#ab7418] hover:from-[#f7cb75] hover:to-[#be8420] text-[#2c1a0c] font-black text-xs rounded-xl border-2 border-[#ffe8b5] shadow-md hover:scale-[1.02] active:scale-95 transition-all duration-200"
                >
                  다음 스테이지로 ➡️
                </button>
              </div>
            </div>
          )}
        </div>
      );
    }


    function PuzzleFiveLoaves({ coins, onSpendCoins, onBack, onSolved }) {
      const [questionIndex, setQuestionIndex] = useState(0);
      const [gauge, setGauge] = useState(0);
      const [showWarningModal, setShowWarningModal] = useState(false);
      const [shakeScreen, setShakeScreen] = useState(false);
      const [showHint, setShowHint] = useState(false);
      const [hintUnlocked, setHintUnlocked] = useState(false);
      const [showUnlockConfirm, setShowUnlockConfirm] = useState(false);
      const [fallingItems, setFallingItems] = useState([]);

      const onSolvedRef = useRef(onSolved);
      useEffect(() => {
        onSolvedRef.current = onSolved;
      }, [onSolved]);

      const quizQuestions = [
        {
          q: "예수님이 5천 명을 먹이실 때 사용한 보리떡은 몇 개인가요?",
          options: ["5개", "50개", "5천 개"],
          correctIdx: 0,
          hint: "보리떡 5개와 물고기 2마리를 가져온 소년의 성경 기록을 생각해보세요."
        },
        {
          q: "다 먹고 남은 조각은 12광주리에 가득 찼다. (O / X)",
          options: ["O (그렇다)", "X (아니다)"],
          correctIdx: 0,
          hint: "기적의 떡을 다 먹은 후 남은 부스러기가 12바구니에 가득 찼는지 성경 기록을 찾아보세요."
        },
        {
          q: "예수님이 오병이어 기적으로 먹인 사람의 수는 여자와 어린아이 외에 총 몇 명인가요?",
          options: ["5,000명", "5명", "500,000명"],
          correctIdx: 0,
          hint: "오병이어로 먹은 남자 어른의 수를 생각해보세요. 오병이어의 이름 뜻도 힌트입니다."
        },
        {
          q: "오병이어 기적에 쓰인 물고기는 총 몇 마리인가요?",
          options: ["2마리", "22마리", "2만 마리"],
          correctIdx: 0,
          hint: "오병이어(五餠二魚)에서 '이魚'는 물고기가 몇 마리인지 알려줍니다."
        },
        {
          q: "이 오병이어의 도시락을 처음 예수님께 드린 사람은 누구인가요?",
          options: ["한 어린아이", "베드로 사도", "빌라도 총독"],
          correctIdx: 0,
          hint: "예수님의 손에 보리떡 5개와 물고기 2마리가 든 작은 도시락을 바쳤던 어린 헌신자를 생각해보세요."
        }
      ];

      const handleRestart = () => {
        setQuestionIndex(0);
        setGauge(0);
        setShowWarningModal(false);
        setShakeScreen(false);
        setShowHint(false);
        setShowUnlockConfirm(false);
        setFallingItems([]);
      };

      const handleHintClick = () => {
        if (hintUnlocked) {
          setShowHint(true);
        } else {
          synth.playClick();
          setShowUnlockConfirm(true);
        }
      };

      const handleConfirmUnlock = () => {
        if (coins >= 10) {
          onSpendCoins(10);
          setHintUnlocked(true);
          setShowUnlockConfirm(false);
          setShowHint(true);
        } else {
          synth.playBarrier();
          alert(`코인이 부족합니다!\n(필요 코인: 10개, 보유 코인: ${coins}개)`);
          setShowUnlockConfirm(false);
        }
      };

      const handleOptionClick = (idx) => {
        const currentQ = quizQuestions[questionIndex];
        
        if (idx === currentQ.correctIdx) {
          // Player selected the correct biblical answer (Winning choice!)
          synth.playConsume();
          const nextGauge = Math.min(100, gauge + 20);
          setGauge(nextGauge);

          // Trigger falling food icons shower animation
          const items = Array.from({ length: 15 }).map((_, i) => ({
            id: Date.now() + i + Math.random(),
            x: Math.random() * 90 + 5,
            type: Math.random() > 0.5 ? 'bread' : 'fish',
            delay: Math.random() * 0.4
          }));
          setFallingItems(prev => [...prev, ...items]);

          // Clear completed falling items after animation duration (1.6s)
          setTimeout(() => {
            setFallingItems(prev => prev.filter(item => !items.includes(item)));
          }, 1800);

          // Proceed to next question
          if (nextGauge >= 100) {
            // Success!
            setTimeout(() => {
              onSolvedRef.current('puzzle-002');
            }, 800);
          } else {
            // Go to next question
            setQuestionIndex(prev => (prev + 1) % quizQuestions.length);
          }
        } else {
          // Player selected an incorrect biblical answer (Losing choice!)
          synth.playBarrier();
          setShakeScreen(true);
          setTimeout(() => setShakeScreen(false), 500);
          setGauge(prev => Math.max(0, prev - 20));
          setShowWarningModal(true);
        }
      };

      const currentQuestion = quizQuestions[questionIndex];

      return (
        <div className={`flex-1 flex flex-col fade-in transition-transform duration-300 ${
          shakeScreen ? 'shake-animation' : ''
        }`}>
          {/* Story Parchment Textbox */}
          <div className="relative p-2.5 bg-layton-parchment border-b-2 border-layton-brown/30 flex-none z-10 shadow-inner">
            <div className="bg-[#f5ebd3]/80 p-2 rounded-lg border border-[#e5d4ab] shadow-sm text-layton-dark text-center">
              <p className="font-layton-myeongjo text-[11px] leading-relaxed font-bold break-keep">
                제자들의 배가 너무 고픕니다! 올바른 성경 정답을 맞춰 보리떡과 물고기가 불어나도록 기적을 부려주세요. 
                <span className="text-red-700 font-extrabold mx-1">틀린 오답</span>을 고르면 떡이 사라지고 점수가 깎이니 주의하세요!
              </p>
            </div>
          </div>

          {/* Interactive Game Layout Frame */}
          <div className="flex-1 bg-[#25170d]/90 p-3 flex flex-col justify-between items-center relative overflow-hidden">
            
            {/* Falling food animated items renderer */}
            {fallingItems.map(item => (
              <div 
                key={item.id}
                className="falling-food-item z-30 text-2xl drop-shadow-md"
                style={{
                  left: `${item.x}%`,
                  animationDelay: `${item.delay}s`
                }}
              >
                {item.type === 'bread' ? '🍞' : '🐟'}
              </div>
            ))}

            {/* Top Stats Box (12 baskets progress bar) */}
            <div className="w-full bg-[#f4ebd0] border-2 border-layton-gold rounded-xl p-2 mb-2 flex items-center justify-between shadow-md z-10">
              <div className="flex items-center gap-1.5">
                <span className="text-xl">🧺</span>
                <span className="font-layton-myeongjo text-xs font-black text-layton-brown">12광주리 게이지</span>
              </div>
              <div className="flex-1 mx-3 bg-[#4a2f13]/20 h-3 rounded-full overflow-hidden border border-[#4a2f13]/30">
                <div 
                  className="bg-gradient-to-r from-amber-500 to-yellow-400 h-full rounded-full transition-all duration-300"
                  style={{ width: `${gauge}%` }}
                ></div>
              </div>
              <div className="text-[11px] font-black text-layton-brown font-serif">{gauge}%</div>
            </div>

            {/* Blackboard Board Frame containing Quiz */}
            <div className="w-full flex-1 flex flex-col justify-between bg-[#0b3c2a] border-4 border-layton-brown rounded-2xl p-4 shadow-inner relative z-10">
              
              {/* Gold outline border inside blackboard */}
              <div className="absolute inset-1 border border-emerald-600 rounded-xl pointer-events-none opacity-40"></div>

              {/* Disciple Avatar Box */}
              <div className="flex items-center gap-3 bg-emerald-950/60 border border-emerald-800 rounded-xl p-2.5">
                {/* Cute SVG Face representing hungry disciple */}
                <div className="w-11 h-11 rounded-full bg-[#dfb973] border-2 border-layton-gold flex items-center justify-center text-2xl relative shadow-md">
                  👨‍🌾
                  {/* Hunger drool or drop effect */}
                  <span className="absolute -bottom-0.5 -right-0.5 text-[10px]">💧</span>
                </div>
                <div className="flex-1 text-left">
                  <span className="text-[8px] bg-amber-500 text-[#2c1a0c] font-black px-1.5 py-0.2 rounded-full font-sans uppercase">Question {questionIndex + 1} / 5</span>
                  <p className="text-[10px] text-emerald-200/90 font-bold font-layton-myeongjo mt-0.5">배고픈 예수님의 제자</p>
                </div>
              </div>

              {/* Question Text */}
              <div className="flex-1 flex items-center justify-center my-4 px-2">
                <p className="text-center font-layton-myeongjo font-bold text-sm text-[#fdf8eb] leading-relaxed break-keep">
                  "{currentQuestion.q}"
                </p>
              </div>

              {/* Choices Options List */}
              <div className="flex flex-col gap-2">
                {currentQuestion.options.map((opt, idx) => (
                  <button
                    key={idx}
                    onClick={() => handleOptionClick(idx)}
                    className="w-full py-2.5 bg-gradient-to-b from-[#ebdcb9] to-[#c2af84] hover:from-[#fcf4dc] hover:to-[#dcd0ac] text-layton-dark font-black font-layton-myeongjo text-xs rounded-xl border-2 border-[#f2e7cb] shadow-[0_3px_5px_rgba(0,0,0,0.3)] active:scale-95 transition-all duration-150 text-center"
                  >
                    {opt}
                  </button>
                ))}
              </div>

            </div>

            {/* Bottom button controls */}
            <div className="w-full flex justify-between items-center mt-3.5 px-1 z-10">
              <button
                onClick={handleHintClick}
                className="bg-gradient-to-b from-[#b17d3b] to-[#7f511c] text-[#fcf5e3] border border-layton-gold/60 font-semibold px-4 py-1.5 rounded-full text-xs font-layton-myeongjo shadow-md active:scale-95 transition-all"
              >
                💡 힌트 보기 {hintUnlocked ? '(해제됨)' : '(🪙 10)'}
              </button>

              <button
                onClick={handleRestart}
                className="bg-gradient-to-b from-[#8f8070] to-[#5a4e42] text-[#fcf5e3] border border-stone-400/40 font-semibold px-4 py-1.5 rounded-full text-xs font-layton-myeongjo shadow-md active:scale-95 transition-all"
              >
                🔄 다시 풀기
              </button>
            </div>

          </div>

          {/* Warning Modal Overlay ("땡! 틀렸습니다.") */}
          {showWarningModal && (
            <div className="absolute inset-0 bg-black/85 backdrop-blur-[2px] z-50 flex items-center justify-center p-5">
              <div className="bg-layton-parchment rounded-2xl border-4 border-red-700 p-5 shadow-2xl w-full max-w-[300px] flex flex-col items-center solved-banner text-center">
                <span className="text-3xl mb-1.5">📖</span>
                <h3 className="font-layton-myeongjo font-black text-sm text-red-800 mb-2">

                </h3>
                <p className="text-layton-dark text-[11px] leading-relaxed font-medium font-layton-myeongjo mb-4 break-keep">

                  제자들에게 풍성한 오병이어의 기적을 베풀기 위해 다시 잘 생각하셔서 **성경 속 진짜 정답**을 골라주세요!
                </p>
                <button
                  onClick={() => setShowWarningModal(false)}
                  className="w-full py-2 bg-gradient-to-b from-red-700 to-red-950 hover:from-red-600 hover:to-red-800 text-[#fff5db] text-xs font-bold rounded-xl border border-red-500 shadow-md active:scale-95 transition-colors font-layton-myeongjo"
                >
                  다시 도전하기 🔄
                </button>
              </div>
            </div>
          )}

          {/* Hint Overlay */}
          {showHint && (
            <div className="absolute inset-0 bg-layton-dark/80 backdrop-blur-[2px] z-40 flex items-center justify-center p-5">
              <div className="bg-layton-parchment rounded-xl border-4 border-layton-amber p-4 shadow-2xl w-full max-w-[300px] flex flex-col items-center solved-banner">
                <div className="w-10 h-10 rounded-full bg-layton-amber flex items-center justify-center text-xl mb-2 text-layton-dark">💡</div>
                <h3 className="font-layton-myeongjo font-black text-sm text-layton-brown mb-2 font-layton-myeongjo">수수께끼 힌트</h3>
                <p className="text-layton-dark text-xs text-center leading-relaxed font-medium font-layton-myeongjo mb-4 break-keep font-layton-myeongjo">
                  "{currentQuestion.hint}"
                </p>
                <button
                  onClick={() => setShowHint(false)}
                  className="w-full py-1.5 bg-layton-brown hover:bg-layton-lightbrown text-layton-cream text-xs font-bold rounded-lg border border-layton-gold transition-colors font-layton-myeongjo"
                >
                  돌아가기
                </button>
              </div>
            </div>
          )}

          {/* Hint Unlock Confirmation Modal */}
          {showUnlockConfirm && (
            <div className="absolute inset-0 bg-layton-dark/80 backdrop-blur-[2px] z-50 flex items-center justify-center p-5">
              <div className="bg-layton-parchment rounded-xl border-4 border-layton-amber p-4 shadow-2xl w-full max-w-[280px] flex flex-col items-center solved-banner text-center">
                <span className="text-3xl mb-1">🪙</span>
                <h3 className="font-layton-myeongjo font-black text-sm text-layton-brown mb-2 font-layton-myeongjo">힌트 해제</h3>
                <p className="text-layton-dark text-xs font-medium font-layton-myeongjo mb-4 break-keep font-layton-myeongjo">

                  >
                    해제 (10🪙)
                  </button>
                </div>
              </div>
            </div>
          )}
        </div>
      );

    function PuzzleMap({ puzzlesList, completedPuzzles, coins, activePuzzleId, isBgmPlaying, onToggleBgm, profileGender, onSelectPuzzle, onBack }) {
